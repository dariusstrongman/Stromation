<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Send Proposal - Stromation Admin</title>
    <link rel="icon" type="image/svg+xml" href="logo-icon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .admin-header { text-align: center; margin-bottom: 2rem; padding-top: 2rem; }
        .admin-header h1 { font-size: 1.8rem; color: var(--text-primary, #1E293B); margin-bottom: 0.5rem; }
        .admin-header p { color: var(--text-secondary, #64748B); }
        .admin-badge { display: inline-block; background: #FEF3C7; color: #92400E; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .proposal-form { background: white; border: 1px solid var(--border, #E2E8F0); border-radius: 12px; padding: 2rem; }
        .proposal-preview { background: var(--bg-light, #F8FAFC); border: 1px solid var(--border, #E2E8F0); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
        .proposal-preview h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .preview-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border, #E2E8F0); }
        .preview-row:last-child { border-bottom: none; font-weight: 700; font-size: 1.1rem; }
        .preview-label { color: var(--text-secondary); }
        .preview-value { color: var(--text-primary); font-weight: 500; text-align: right; max-width: 60%; }
        .status-msg { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
        select { width: 100%; padding: 0.65rem 0.75rem; border: 1px solid var(--border, #E2E8F0); border-radius: 8px; font-size: 0.95rem; font-family: 'Inter', sans-serif; background: white; color: var(--text-primary, #1E293B); }
        select:focus { outline: none; border-color: var(--primary, #2563EB); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    </style>
</head>
<body>
<script>
(function() {
    var k = sessionStorage.getItem('stromation_admin');
    if (k !== 'darius2026') {
        var p = prompt('Admin access required. Enter password:');
        if (p !== 'darius2026') {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#64748B;"><p>Access denied.</p></div>';
            return;
        }
        sessionStorage.setItem('stromation_admin', 'darius2026');
    }
})();
</script>

    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-badge">Admin Only</div>
            <h1>Send Proposal</h1>
            <p>Fill in the details and hit send. The client gets a professional proposal email.</p>
        </div>

        <form class="proposal-form" id="proposalForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="clientName">Client Name *</label>
                    <input type="text" id="clientName" required placeholder="Business or person name">
                </div>
                <div class="form-group">
                    <label for="clientEmail">Client Email *</label>
                    <input type="email" id="clientEmail" required placeholder="client@email.com">
                </div>
            </div>

            <div class="form-group">
                <label for="projectTitle">Project Title *</label>
                <input type="text" id="projectTitle" required placeholder="e.g., Lead Gen Automation System">
            </div>

            <div class="form-group">
                <label for="projectDescription">Project Description *</label>
                <textarea id="projectDescription" required placeholder="Describe what will be built, the deliverables, and key outcomes..." rows="4"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tier">Tier</label>
                    <select id="tier">
                        <option value="Simple ($1K-$2.5K)">Simple $1K-$2.5K</option>
                        <option value="AI-Assisted ($2.5K-$6K)" selected>AI-Assisted $2.5K-$6K</option>
                        <option value="End-to-End ($6K-$15K+)">End-to-End $6K-$15K+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">Quoted Amount ($) *</label>
                    <input type="number" id="amount" required min="1" step="0.01" placeholder="3500">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="timeline">Timeline</label>
                    <select id="timeline">
                        <option value="1-2 weeks">1-2 weeks</option>
                        <option value="2-4 weeks" selected>2-4 weeks</option>
                        <option value="4-6 weeks">4-6 weeks</option>
                        <option value="6+ weeks">6+ weeks</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="retainer">Retainer</label>
                    <select id="retainer">
                        <option value="None">None</option>
                        <option value="Monitor ($99/mo)">Monitor $99/mo</option>
                        <option value="Maintain ($149/mo)">Maintain $149/mo</option>
                        <option value="Optimize ($499/mo)">Optimize $499/mo</option>
                    </select>
                </div>
            </div>

            <!-- Live preview -->
            <div class="proposal-preview" id="preview">
                <h3>Proposal Preview</h3>
                <div class="preview-row">
                    <span class="preview-label">Client</span>
                    <span class="preview-value" id="prevClient">—</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Project</span>
                    <span class="preview-value" id="prevProject">—</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Tier</span>
                    <span class="preview-value" id="prevTier">AI-Assisted ($2.5K-$6K)</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Timeline</span>
                    <span class="preview-value" id="prevTimeline">2-4 weeks</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Retainer</span>
                    <span class="preview-value" id="prevRetainer">None</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Quoted Amount</span>
                    <span class="preview-value" id="prevAmount">$0</span>
                </div>
            </div>

            <button type="submit" class="contact-submit" id="submitBtn" style="margin-top: 1.5rem; width: 100%;">Send Proposal</button>
            <div class="status-msg" id="statusMsg"></div>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted, #94A3B8); font-size: 0.85rem;">
            Proposal is sent from darius@stromation.com and BCC'd to your Gmail.
        </p>
    </div>

    <script>
    // Live preview
    var fields = ['clientName', 'clientEmail', 'projectTitle', 'projectDescription', 'tier', 'amount', 'timeline', 'retainer'];
    fields.forEach(function(id) {
        document.getElementById(id).addEventListener('input', updatePreview);
        document.getElementById(id).addEventListener('change', updatePreview);
    });

    function updatePreview() {
        document.getElementById('prevClient').textContent = document.getElementById('clientName').value || '—';
        document.getElementById('prevProject').textContent = document.getElementById('projectTitle').value || '—';
        document.getElementById('prevTier').textContent = document.getElementById('tier').value || '—';
        document.getElementById('prevTimeline').textContent = document.getElementById('timeline').value || '—';
        document.getElementById('prevRetainer').textContent = document.getElementById('retainer').value || 'None';
        var amt = parseFloat(document.getElementById('amount').value) || 0;
        document.getElementById('prevAmount').textContent = '$' + amt.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    updatePreview();

    // Submit
    document.getElementById('proposalForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('submitBtn');
        var msg = document.getElementById('statusMsg');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        msg.style.display = 'none';

        var payload = {
            client_name: document.getElementById('clientName').value,
            client_email: document.getElementById('clientEmail').value,
            project_title: document.getElementById('projectTitle').value,
            project_description: document.getElementById('projectDescription').value,
            tier: document.getElementById('tier').value,
            amount: parseFloat(document.getElementById('amount').value),
            timeline: document.getElementById('timeline').value,
            retainer: document.getElementById('retainer').value
        };

        try {
            var resp = await fetch('https://n8n.myaibuffet.com/webhook/stromation-proposal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                msg.style.display = 'block';
                msg.style.background = 'rgba(16,185,129,0.1)';
                msg.style.border = '1px solid rgba(16,185,129,0.3)';
                msg.style.color = '#059669';
                msg.innerHTML = '<strong>Proposal sent.</strong> ' + payload.client_name + ' will receive it at ' + payload.client_email + '. A copy was BCC\'d to your Gmail.';
                this.reset();
                updatePreview();
            } else {
                throw new Error('Failed');
            }
        } catch(err) {
            msg.style.display = 'block';
            msg.style.background = 'rgba(239,68,68,0.1)';
            msg.style.border = '1px solid rgba(239,68,68,0.3)';
            msg.style.color = '#DC2626';
            msg.innerHTML = '<strong>Failed to send.</strong> Check n8n or try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Proposal';
        }
    });
    </script>
</body>
</html>
