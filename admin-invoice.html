<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Send Invoice - Stromation Admin</title>
    <link rel="icon" type="image/svg+xml" href="logo-icon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .admin-header { text-align: center; margin-bottom: 2rem; padding-top: 2rem; }
        .admin-header h1 { font-size: 1.8rem; color: var(--text-primary, #1E293B); margin-bottom: 0.5rem; }
        .admin-header p { color: var(--text-secondary, #64748B); }
        .admin-badge { display: inline-block; background: #FEF3C7; color: #92400E; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .invoice-form { background: white; border: 1px solid var(--border, #E2E8F0); border-radius: 12px; padding: 2rem; }
        .invoice-preview { background: var(--bg-light, #F8FAFC); border: 1px solid var(--border, #E2E8F0); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
        .invoice-preview h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .preview-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border, #E2E8F0); }
        .preview-row:last-child { border-bottom: none; font-weight: 700; font-size: 1.1rem; }
        .preview-label { color: var(--text-secondary); }
        .preview-value { color: var(--text-primary); font-weight: 500; }
        .status-msg { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
<script>
(function() {
    var k = sessionStorage.getItem('stromation_admin');
    if (k !== 'darius2026') {
        var p = prompt('Admin access required. Enter password:');
        if (p !== 'darius2026') {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#64748B;"><p>Access denied.</p></div>';
            return;
        }
        sessionStorage.setItem('stromation_admin', 'darius2026');
    }
})();
</script>

    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-badge">Admin Only</div>
            <h1>Send Invoice</h1>
            <p>Fill in the details and hit send. The client gets a professional invoice email.</p>
        </div>

        <form class="invoice-form" id="invoiceForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="clientName">Client Name *</label>
                    <input type="text" id="clientName" required placeholder="Business or person name">
                </div>
                <div class="form-group">
                    <label for="clientEmail">Client Email *</label>
                    <input type="email" id="clientEmail" required placeholder="client@email.com">
                </div>
            </div>

            <div class="form-group">
                <label for="project">Project Description *</label>
                <input type="text" id="project" required placeholder="e.g., Lead gen automation system">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="amount">Amount ($) *</label>
                    <input type="number" id="amount" required min="1" step="0.01" placeholder="2500">
                </div>
                <div class="form-group">
                    <label for="dueDate">Due Date *</label>
                    <input type="date" id="dueDate" required>
                </div>
            </div>

            <div class="form-group">
                <label for="notes">Notes (optional)</label>
                <textarea id="notes" placeholder="Payment instructions, milestone details, etc." rows="3"></textarea>
            </div>

            <!-- Live preview -->
            <div class="invoice-preview" id="preview">
                <h3>Invoice Preview</h3>
                <div class="preview-row">
                    <span class="preview-label">To</span>
                    <span class="preview-value" id="prevClient">—</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Project</span>
                    <span class="preview-value" id="prevProject">—</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Due Date</span>
                    <span class="preview-value" id="prevDue">—</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Total</span>
                    <span class="preview-value" id="prevAmount">$0</span>
                </div>
            </div>

            <button type="submit" class="contact-submit" id="submitBtn" style="margin-top: 1.5rem; width: 100%;">Send Invoice</button>
            <div class="status-msg" id="statusMsg"></div>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted, #94A3B8); font-size: 0.85rem;">
            Invoice is sent from leads@stromation.com and CC'd to your Gmail.
        </p>
    </div>

    <script>
    // Live preview
    var fields = ['clientName', 'clientEmail', 'project', 'amount', 'dueDate'];
    fields.forEach(function(id) {
        document.getElementById(id).addEventListener('input', updatePreview);
    });

    function updatePreview() {
        document.getElementById('prevClient').textContent = document.getElementById('clientName').value || '—';
        document.getElementById('prevProject').textContent = document.getElementById('project').value || '—';
        var amt = parseFloat(document.getElementById('amount').value) || 0;
        document.getElementById('prevAmount').textContent = '$' + amt.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        var dateVal = document.getElementById('dueDate').value;
        if (dateVal) {
            var d = new Date(dateVal + 'T00:00:00');
            document.getElementById('prevDue').textContent = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        } else {
            document.getElementById('prevDue').textContent = '—';
        }
    }

    // Set default due date to 15 days from now
    var defaultDue = new Date();
    defaultDue.setDate(defaultDue.getDate() + 15);
    document.getElementById('dueDate').value = defaultDue.toISOString().split('T')[0];
    updatePreview();

    // Submit
    document.getElementById('invoiceForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('submitBtn');
        var msg = document.getElementById('statusMsg');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        msg.style.display = 'none';

        var payload = {
            client_name: document.getElementById('clientName').value,
            client_email: document.getElementById('clientEmail').value,
            project: document.getElementById('project').value,
            amount: parseFloat(document.getElementById('amount').value),
            due_date: document.getElementById('dueDate').value,
            notes: document.getElementById('notes').value || ''
        };

        try {
            var resp = await fetch('https://n8n.myaibuffet.com/webhook/stromation-invoice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                msg.style.display = 'block';
                msg.style.background = 'rgba(16,185,129,0.1)';
                msg.style.border = '1px solid rgba(16,185,129,0.3)';
                msg.style.color = '#059669';
                msg.innerHTML = '<strong>Invoice sent.</strong> ' + payload.client_name + ' will receive it at ' + payload.client_email + '. A copy was CC\'d to your Gmail.';
                this.reset();
                updatePreview();
            } else {
                throw new Error('Failed');
            }
        } catch(err) {
            msg.style.display = 'block';
            msg.style.background = 'rgba(239,68,68,0.1)';
            msg.style.border = '1px solid rgba(239,68,68,0.3)';
            msg.style.color = '#DC2626';
            msg.innerHTML = '<strong>Failed to send.</strong> Check n8n or try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Invoice';
        }
    });
    </script>
</body>
</html>
