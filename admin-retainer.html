<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Retainer Billing - Stromation Admin</title>
    <link rel="icon" type="image/svg+xml" href="logos/logo-transparent.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-new.css">
    <style>
        .admin-container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .admin-header { text-align: center; margin-bottom: 2rem; padding-top: 2rem; }
        .admin-header h1 { font-size: 1.8rem; color: var(--text-primary, #1E293B); margin-bottom: 0.5rem; }
        .admin-header p { color: var(--text-secondary, #64748B); }
        .admin-badge { display: inline-block; background: #FEF3C7; color: #92400E; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .invoice-form { background: white; border: 1px solid var(--border, #E2E8F0); border-radius: 12px; padding: 2rem; }
        .invoice-preview { background: var(--bg-light, #F8FAFC); border: 1px solid var(--border, #E2E8F0); border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
        .invoice-preview h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 1rem; }
        .preview-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border, #E2E8F0); }
        .preview-row:last-child { border-bottom: none; font-weight: 700; font-size: 1.1rem; }
        .preview-label { color: var(--text-secondary); }
        .preview-value { color: var(--text-primary); font-weight: 500; }
        .status-msg { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
        .checkout-url-box { margin-top: 1rem; padding: 1rem; background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: 8px; display: none; }
        .checkout-url-box label { font-size: 0.85rem; font-weight: 600; color: #0369A1; display: block; margin-bottom: 0.5rem; }
        .checkout-url-box input { width: 100%; padding: 0.5rem; border: 1px solid #BAE6FD; border-radius: 6px; font-size: 0.85rem; color: #1E293B; box-sizing: border-box; }
        .checkout-url-box .copy-btn { margin-top: 0.5rem; background: #0EA5E9; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .checkout-url-box .copy-btn:hover { background: #0284C7; }
    </style>
</head>
<body>
<script>
(function() {
    var k = sessionStorage.getItem('stromation_admin');
    if (k !== 'Kyomi123') {
        var p = prompt('Admin access required. Enter password:');
        if (p !== 'Kyomi123') {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#64748B;"><p>Access denied.</p></div>';
            return;
        }
        sessionStorage.setItem('stromation_admin', 'Kyomi123');
    }
})();
</script>

    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-badge">Admin Only</div>
            <h1>Retainer Billing</h1>
            <p>Set up a recurring retainer for a client. They'll receive a Stripe checkout link via email.</p>
        </div>

        <form class="invoice-form" id="retainerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="clientName">Client Name *</label>
                    <input type="text" id="clientName" required placeholder="Business or person name">
                </div>
                <div class="form-group">
                    <label for="clientEmail">Client Email *</label>
                    <input type="email" id="clientEmail" required placeholder="client@email.com">
                </div>
            </div>

            <div class="form-group">
                <label for="plan">Retainer Plan *</label>
                <select id="plan" required>
                    <option value="monitor">Monitor - $99/mo</option>
                    <option value="maintain">Maintain - $149/mo</option>
                    <option value="optimize">Optimize - $499/mo</option>
                </select>
            </div>

            <!-- Live preview -->
            <div class="invoice-preview" id="preview">
                <h3>Retainer Preview</h3>
                <div class="preview-row">
                    <span class="preview-label">Client</span>
                    <span class="preview-value" id="prevClient">&mdash;</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Email</span>
                    <span class="preview-value" id="prevEmail">&mdash;</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Plan</span>
                    <span class="preview-value" id="prevPlan">Monitor</span>
                </div>
                <div class="preview-row">
                    <span class="preview-label">Monthly</span>
                    <span class="preview-value" id="prevPrice">$99/mo</span>
                </div>
            </div>

            <button type="submit" class="contact-submit" id="submitBtn" style="margin-top: 1.5rem; width: 100%;">Send Retainer Link</button>
            <div class="status-msg" id="statusMsg"></div>

            <div class="checkout-url-box" id="checkoutBox">
                <label>Stripe Checkout URL (share with client):</label>
                <input type="text" id="checkoutUrl" readonly>
                <button type="button" class="copy-btn" onclick="copyUrl()">Copy URL</button>
            </div>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted, #94A3B8); font-size: 0.85rem;">
            Client receives a branded email from darius@stromation.com with the checkout link.
        </p>
    </div>

    <script>
    var planPrices = { monitor: "$99/mo", maintain: "$149/mo", optimize: "$499/mo" };
    var planNames = { monitor: "Monitor", maintain: "Maintain", optimize: "Optimize" };

    // Live preview
    ['clientName', 'clientEmail', 'plan'].forEach(function(id) {
        document.getElementById(id).addEventListener('input', updatePreview);
        document.getElementById(id).addEventListener('change', updatePreview);
    });

    function updatePreview() {
        document.getElementById('prevClient').textContent = document.getElementById('clientName').value || '\u2014';
        document.getElementById('prevEmail').textContent = document.getElementById('clientEmail').value || '\u2014';
        var p = document.getElementById('plan').value;
        document.getElementById('prevPlan').textContent = planNames[p] || 'Monitor';
        document.getElementById('prevPrice').textContent = planPrices[p] || '$99/mo';
    }

    function copyUrl() {
        var input = document.getElementById('checkoutUrl');
        input.select();
        document.execCommand('copy');
        var btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy URL'; }, 2000);
    }

    // Submit
    document.getElementById('retainerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('submitBtn');
        var msg = document.getElementById('statusMsg');
        var box = document.getElementById('checkoutBox');
        btn.disabled = true;
        btn.textContent = 'Setting up...';
        msg.style.display = 'none';
        box.style.display = 'none';

        var payload = {
            client_name: document.getElementById('clientName').value,
            client_email: document.getElementById('clientEmail').value,
            plan: document.getElementById('plan').value
        };

        try {
            var resp = await fetch('https://n8n.stromation.com/webhook/stromation-retainer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                var data = await resp.json();
                msg.style.display = 'block';
                msg.style.background = 'rgba(16,185,129,0.1)';
                msg.style.border = '1px solid rgba(16,185,129,0.3)';
                msg.style.color = '#059669';
                msg.innerHTML = '<strong>Retainer link sent!</strong> ' + payload.client_name + ' will receive the checkout link at ' + payload.client_email + '.';

                if (data.checkoutUrl) {
                    document.getElementById('checkoutUrl').value = data.checkoutUrl;
                    box.style.display = 'block';
                }

                this.reset();
                updatePreview();
            } else {
                throw new Error('Failed');
            }
        } catch(err) {
            msg.style.display = 'block';
            msg.style.background = 'rgba(239,68,68,0.1)';
            msg.style.border = '1px solid rgba(239,68,68,0.3)';
            msg.style.color = '#DC2626';
            msg.innerHTML = '<strong>Failed to send.</strong> Check n8n or try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Retainer Link';
        }
    });
    </script>
</body>
</html>
