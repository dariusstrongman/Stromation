<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>TBE Parts Catalog | Stromation Admin</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F172A;color:#E2E8F0;min-height:100vh;}
  .header{background:#1E293B;border-bottom:1px solid #334155;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
  .header h1{font-size:1.4rem;color:#F8FAFC;}
  .header a{color:#94A3B8;text-decoration:none;font-size:0.85rem;}
  .header a:hover{color:#F8FAFC;}
  .container{max-width:1400px;margin:0 auto;padding:1.5rem 2rem;}
  .toolbar{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
  .toolbar input,.toolbar select{padding:0.5rem 0.75rem;background:#1E293B;border:1px solid #334155;border-radius:6px;color:#E2E8F0;font-size:0.85rem;}
  .toolbar input{min-width:240px;}
  .stats{display:flex;gap:1rem;margin-left:auto;font-size:0.8rem;color:#94A3B8;}
  .stat{background:#1E293B;padding:6px 10px;border-radius:6px;}
  .btn{padding:0.5rem 1rem;border-radius:6px;border:none;cursor:pointer;font-size:0.85rem;font-weight:600;}
  .btn-green{background:#10B981;color:white;}
  .btn-blue{background:#3B82F6;color:white;}
  .btn-red{background:#EF4444;color:white;}
  .btn-outline{background:transparent;border:1px solid #475569;color:#CBD5E1;}
  table{width:100%;border-collapse:collapse;background:#1E293B;border-radius:8px;overflow:hidden;}
  th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #334155;font-size:0.85rem;}
  th{background:#0F172A;color:#94A3B8;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;}
  th:hover{color:#F8FAFC;}
  tr.inactive{opacity:0.4;}
  td input{background:#0F172A;border:1px solid #334155;color:#E2E8F0;padding:4px 6px;border-radius:4px;font-size:0.85rem;width:100%;}
  td input.price{text-align:right;font-family:monospace;}
  td input:focus{border-color:#3B82F6;outline:none;}
  .tier-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.65rem;font-weight:700;text-transform:uppercase;}
  .tier-qsr{background:rgba(34,197,94,0.15);color:#86EFAC;}
  .tier-commercial{background:rgba(59,130,246,0.15);color:#93C5FD;}
  .tier-enterprise{background:rgba(168,85,247,0.15);color:#D8B4FE;}
  .tier-all{background:rgba(148,163,184,0.15);color:#CBD5E1;}
  .toggle{cursor:pointer;}
  .source-tag{font-size:0.7rem;color:#64748B;font-style:italic;}
  .pw-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0F172A;}
  .pw-box{background:#1E293B;padding:2rem;border-radius:12px;border:1px solid #334155;text-align:center;}
  .pw-box input{padding:0.6rem 1rem;background:#0F172A;border:1px solid #334155;border-radius:6px;color:#E2E8F0;margin:0.75rem 0;}
  .pw-box button{padding:0.6rem 1.25rem;background:#3B82F6;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;}
  .hidden{display:none;}
  .add-row{background:#0a1222;border-top:2px solid #334155;}
  .add-row td{padding:6px 10px;}
  .saving{color:#F59E0B;font-size:0.7rem;}
  .saved{color:#10B981;font-size:0.7rem;}
  .save-error{color:#EF4444;font-size:0.7rem;}
</style>
</head>
<body>

<div id="pwGate" class="pw-gate">
  <div class="pw-box">
    <h2 style="color:#F8FAFC;">TBE Parts Catalog</h2>
    <p style="color:#94A3B8;font-size:0.85rem;margin:0.5rem 0 1rem;">Admin access only</p>
    <input type="password" id="pwInput" placeholder="Password" onkeyup="if(event.key==='Enter')checkPw()">
    <br><button onclick="checkPw()">Access Catalog</button>
    <div id="pwError" style="color:#FCA5A5;display:none;margin-top:0.5rem;font-size:0.85rem;">Wrong password</div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <h1>TBE Parts Catalog <span style="font-size:0.75rem;color:#94A3B8;font-weight:400;margin-left:0.5rem;" id="lastUpdated"></span></h1>
    <a href="admin-bids.html">← Back to Bid Tracker</a>
  </div>
  <div class="container">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search manufacturer / model / part name..." oninput="renderParts()">
      <select id="filterCategory" onchange="renderParts()"><option value="">All categories</option></select>
      <select id="filterTier" onchange="renderParts()">
        <option value="">All tiers</option>
        <option value="qsr">QSR</option>
        <option value="commercial">Commercial</option>
        <option value="enterprise">Enterprise</option>
        <option value="all">All-tier</option>
      </select>
      <select id="filterActive" onchange="renderParts()">
        <option value="active">Active only</option>
        <option value="">All (incl. inactive)</option>
        <option value="inactive">Inactive only</option>
      </select>
      <button class="btn btn-green" onclick="addNewPart()">+ Add Part</button>
      <div class="stats">
        <div class="stat" id="statTotal">0 parts</div>
        <div class="stat" id="statQsr">0 QSR</div>
        <div class="stat" id="statComm">0 Comm</div>
        <div class="stat" id="statEnt">0 Ent</div>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('manufacturer')">Manufacturer</th>
          <th onclick="sortBy('model')">Model</th>
          <th onclick="sortBy('category')">Category</th>
          <th onclick="sortBy('tier')">Tier</th>
          <th>Default?</th>
          <th>Description</th>
          <th>Unit</th>
          <th style="text-align:right;">Unit Price</th>
          <th>Source</th>
          <th>Active</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="partsBody"></tbody>
    </table>
  </div>
</div>

<script>
const SB='https://iadzcnzgbtuigyodeqas.supabase.co';
const SB_KEY='sb_publishable_8qa-nssfdtEkCz-42wOSWQ_2P7S4Zj7';
const H={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'};

function checkPw(){
  if(document.getElementById('pwInput').value==='Kyomi123'){
    sessionStorage.setItem('tbe_auth','1');
    document.getElementById('pwGate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadParts();
  } else {
    document.getElementById('pwError').style.display='block';
  }
}
if(sessionStorage.getItem('tbe_auth')==='1'){
  document.getElementById('pwGate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadParts();
}

var allParts=[];
var currentSort='category';
var sortAsc=true;

async function loadParts(){
  try{
    var r=await fetch(SB+'/rest/v1/tbe_parts_catalog?select=*&order=category.asc,tier.asc,manufacturer.asc',{headers:H});
    if(!r.ok){alert('Failed to load parts: '+r.status+'\n\nMake sure docs/tbe-schema-spec-system.sql + tbe-parts-catalog-seed.sql have been run in Supabase.');return;}
    allParts=await r.json();
    populateCategoryFilter();
    renderParts();
  } catch(e){alert('Load error: '+e.message);}
}

function populateCategoryFilter(){
  var cats=[...new Set(allParts.map(function(p){return p.category;}))].sort();
  var sel=document.getElementById('filterCategory');
  sel.innerHTML='<option value="">All categories</option>'+cats.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
}

function sortBy(field){
  if(currentSort===field){sortAsc=!sortAsc;}else{currentSort=field;sortAsc=true;}
  renderParts();
}

function renderParts(){
  var search=document.getElementById('search').value.toLowerCase();
  var fc=document.getElementById('filterCategory').value;
  var ft=document.getElementById('filterTier').value;
  var fa=document.getElementById('filterActive').value;

  var filtered=allParts.filter(function(p){
    if(search){
      var hay=(p.manufacturer+' '+p.model+' '+(p.description||'')+' '+(p.sub_category||'')).toLowerCase();
      if(hay.indexOf(search)===-1)return false;
    }
    if(fc && p.category!==fc)return false;
    if(ft && p.tier!==ft)return false;
    if(fa==='active' && !p.is_active)return false;
    if(fa==='inactive' && p.is_active)return false;
    return true;
  });

  filtered.sort(function(a,b){
    var av=(a[currentSort]||'').toString().toLowerCase();
    var bv=(b[currentSort]||'').toString().toLowerCase();
    if(currentSort==='unit_price'){av=Number(a.unit_price)||0;bv=Number(b.unit_price)||0;}
    if(av<bv)return sortAsc?-1:1;
    if(av>bv)return sortAsc?1:-1;
    return 0;
  });

  document.getElementById('statTotal').textContent=filtered.length+' shown / '+allParts.filter(function(p){return p.is_active;}).length+' active';
  document.getElementById('statQsr').textContent=allParts.filter(function(p){return p.is_active && (p.tier==='qsr');}).length+' QSR';
  document.getElementById('statComm').textContent=allParts.filter(function(p){return p.is_active && (p.tier==='commercial');}).length+' Comm';
  document.getElementById('statEnt').textContent=allParts.filter(function(p){return p.is_active && (p.tier==='enterprise');}).length+' Ent';

  var html='';
  filtered.forEach(function(p){
    html+='<tr class="'+(p.is_active?'':'inactive')+'" data-id="'+p.id+'">';
    html+='<td><input value="'+escAttr(p.manufacturer)+'" onchange="savePart(\''+p.id+'\',\'manufacturer\',this.value,this)"></td>';
    html+='<td><input value="'+escAttr(p.model)+'" onchange="savePart(\''+p.id+'\',\'model\',this.value,this)"></td>';
    html+='<td><input value="'+escAttr(p.category)+'" onchange="savePart(\''+p.id+'\',\'category\',this.value,this)"></td>';
    html+='<td><select onchange="savePart(\''+p.id+'\',\'tier\',this.value,this)">';
    ['qsr','commercial','enterprise','all'].forEach(function(t){
      html+='<option value="'+t+'"'+(p.tier===t?' selected':'')+'>'+t+'</option>';
    });
    html+='</select></td>';
    html+='<td><input type="checkbox" '+(p.is_default_for_tier?'checked':'')+' onchange="savePart(\''+p.id+'\',\'is_default_for_tier\',this.checked,this)"></td>';
    html+='<td><input value="'+escAttr(p.description||'')+'" onchange="savePart(\''+p.id+'\',\'description\',this.value,this)"></td>';
    html+='<td><input style="width:50px;" value="'+escAttr(p.unit||'ea')+'" onchange="savePart(\''+p.id+'\',\'unit\',this.value,this)"></td>';
    html+='<td><input class="price" type="number" step="0.01" value="'+(p.unit_price||0)+'" onchange="savePart(\''+p.id+'\',\'unit_price\',parseFloat(this.value)||0,this)"></td>';
    html+='<td><input style="width:120px;font-size:0.7rem;" value="'+escAttr(p.source||'')+'" onchange="savePart(\''+p.id+'\',\'source\',this.value,this)" title="e.g. antonio_quote_2026_04, msrp, distributor"></td>';
    html+='<td><input type="checkbox" '+(p.is_active?'checked':'')+' onchange="savePart(\''+p.id+'\',\'is_active\',this.checked,this)"></td>';
    html+='<td><button class="btn btn-red" style="padding:3px 8px;font-size:0.7rem;" onclick="deletePart(\''+p.id+'\')">×</button></td>';
    html+='</tr>';
  });
  document.getElementById('partsBody').innerHTML=html;
}

function escAttr(s){return String(s||'').replace(/"/g,'&quot;');}

async function savePart(id,field,value,inputEl){
  var body={};body[field]=value;
  inputEl.style.borderColor='#F59E0B';
  try{
    var r=await fetch(SB+'/rest/v1/tbe_parts_catalog?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify(body)});
    if(r.ok){
      inputEl.style.borderColor='#10B981';
      // Update local cache
      var p=allParts.find(function(x){return x.id===id;});
      if(p){p[field]=value;}
      setTimeout(function(){inputEl.style.borderColor='';},900);
    } else {
      inputEl.style.borderColor='#EF4444';
      var err=await r.text();
      alert('Save failed: '+err);
    }
  } catch(e){
    inputEl.style.borderColor='#EF4444';
    alert('Save error: '+e.message);
  }
}

async function addNewPart(){
  var mfr=prompt('Manufacturer (e.g. Panduit):');if(!mfr)return;
  var model=prompt('Model number:');if(!model)return;
  var category=prompt('Category (e.g. cable, jack, camera_fixed, nvr, rack):');if(!category)return;
  var price=prompt('Unit price (USD):');if(price===null)return;
  var tier=prompt('Tier (qsr / commercial / enterprise / all):','all');if(!tier)return;
  try{
    var r=await fetch(SB+'/rest/v1/tbe_parts_catalog',{method:'POST',headers:Object.assign({},H,{Prefer:'return=representation'}),body:JSON.stringify({
      manufacturer:mfr,model:model,category:category,unit_price:parseFloat(price)||0,tier:tier,is_active:true,source:'manual_add_'+(new Date().toISOString().slice(0,10))
    })});
    if(r.ok){
      await loadParts();
    } else {
      alert('Add failed: '+await r.text());
    }
  } catch(e){alert('Add error: '+e.message);}
}

async function deletePart(id){
  var p=allParts.find(function(x){return x.id===id;});
  if(!p)return;
  if(!confirm('Delete '+p.manufacturer+' '+p.model+'? This is permanent.\n\nTip: instead of deleting, you can uncheck "Active" to hide it from quotes while preserving history.'))return;
  try{
    var r=await fetch(SB+'/rest/v1/tbe_parts_catalog?id=eq.'+id,{method:'DELETE',headers:H});
    if(r.ok){await loadParts();}else{alert('Delete failed: '+await r.text());}
  } catch(e){alert('Delete error: '+e.message);}
}
</script>
</body>
</html>
