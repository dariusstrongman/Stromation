<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard - Stromation Admin</title>
    <link rel="icon" type="image/svg+xml" href="logo-icon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F8FAFC; color: #1E293B; min-height: 100vh; }

        /* Header */
        .dash-header {
            background: #0F172A;
            color: #fff;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dash-header-left { display: flex; align-items: center; gap: 1rem; }
        .dash-header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.5px; }
        .dash-header .brand { color: #3B82F6; }
        .admin-badge { display: inline-block; background: #FEF3C7; color: #92400E; font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .dash-header-right { font-size: 0.8rem; color: #94A3B8; }
        .refresh-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10B981; margin-right: 6px; }

        /* Container */
        .dash-container { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }

        /* Stats row */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: #fff;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .stat-card .stat-label { font-size: 0.78rem; color: #64748B; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.35rem; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 800; }
        .stat-card .stat-value.blue { color: #2563EB; }
        .stat-card .stat-value.sky { color: #0EA5E9; }
        .stat-card .stat-value.amber { color: #F59E0B; }
        .stat-card .stat-value.emerald { color: #10B981; }

        /* Sections */
        .dash-section {
            background: #fff;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .dash-section-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dash-section-header h2 { font-size: 1rem; font-weight: 700; }
        .dash-section-header .count { font-size: 0.8rem; color: #64748B; font-weight: 500; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        thead { background: #F8FAFC; }
        th { padding: 0.7rem 1rem; text-align: left; font-weight: 600; color: #64748B; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; border-bottom: 1px solid #E2E8F0; }
        td { padding: 0.65rem 1rem; border-bottom: 1px solid #F1F5F9; color: #1E293B; white-space: nowrap; }
        tbody tr:hover { background: #F8FAFC; }
        td a { color: #2563EB; text-decoration: none; }
        td a:hover { text-decoration: underline; }

        /* Status badges */
        .status-badge { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: capitalize; }
        .status-new { background: #DBEAFE; color: #1D4ED8; }
        .status-in_campaign { background: #FEF3C7; color: #92400E; }
        .status-replied { background: #D1FAE5; color: #065F46; }
        .status-won { background: #A7F3D0; color: #047857; }
        .status-not_interested { background: #F1F5F9; color: #64748B; }

        /* Loading spinner */
        .loading-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: #64748B;
            gap: 0.75rem;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #E2E8F0;
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .dash-header { flex-direction: column; gap: 0.5rem; text-align: center; }
            .dash-container { padding: 1rem; }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<script>
(function() {
    var k = sessionStorage.getItem('stromation_admin');
    if (k !== 'Kyomi123') {
        var p = prompt('Admin access required. Enter password:');
        if (p !== 'Kyomi123') {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#64748B;"><p>Access denied.</p></div>';
            return;
        }
        sessionStorage.setItem('stromation_admin', 'Kyomi123');
    }
})();
</script>

    <header class="dash-header">
        <div class="dash-header-left">
            <h1><span class="brand">STROMATION</span> Dashboard</h1>
            <span class="admin-badge">Admin Only</span>
        </div>
        <div class="dash-header-right">
            <span class="refresh-indicator" id="liveIndicator"></span>
            <span id="lastUpdated">Loading...</span>
        </div>
    </header>

    <div class="dash-container">
        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Leads</div>
                <div class="stat-value blue" id="statTotal">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">New</div>
                <div class="stat-value sky" id="statNew">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">In Campaign</div>
                <div class="stat-value amber" id="statCampaign">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Replied / Won</div>
                <div class="stat-value emerald" id="statWon">—</div>
            </div>
        </div>

        <!-- Pipeline Table -->
        <div class="dash-section">
            <div class="dash-section-header">
                <h2>Sales Pipeline</h2>
                <span class="count" id="pipelineCount"></span>
            </div>
            <div id="pipelineBody">
                <div class="loading-overlay"><div class="spinner"></div> Loading pipeline...</div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="dash-section">
            <div class="dash-section-header">
                <h2>Recent Activity</h2>
                <span class="count">Last 10 outreach logs</span>
            </div>
            <div id="activityBody">
                <div class="loading-overlay"><div class="spinner"></div> Loading activity...</div>
            </div>
        </div>
    </div>

    <script>
    var SUPABASE_URL = 'https://iadzcnzgbtuigyodeqas.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_8qa-nssfdtEkCz-42wOSWQ_2P7S4Zj7';
    var HEADERS = {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
    };

    function statusClass(s) {
        var map = { new: 'status-new', in_campaign: 'status-in_campaign', replied: 'status-replied', won: 'status-won', not_interested: 'status-not_interested' };
        return map[s] || 'status-new';
    }

    function statusLabel(s) {
        var map = { new: 'New', in_campaign: 'In Campaign', replied: 'Replied', won: 'Won', not_interested: 'Not Interested' };
        return map[s] || s || '—';
    }

    function fmtDate(d) {
        if (!d) return '—';
        var dt = new Date(d);
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function fetchData(table, params) {
        var url = SUPABASE_URL + '/rest/v1/' + table + '?' + params;
        var resp = await fetch(url, { headers: HEADERS });
        if (!resp.ok) throw new Error('Supabase error: ' + resp.status);
        return resp.json();
    }

    async function loadDashboard() {
        try {
            // Fetch businesses and outreach logs in parallel
            var [businesses, logs] = await Promise.all([
                fetchData('businesses', 'select=*&order=created_at.desc'),
                fetchData('outreach_log', 'select=*&order=created_at.desc&limit=10')
            ]);

            // Stats
            var total = businesses.length;
            var newCount = businesses.filter(function(b) { return b.outreach_status === 'new'; }).length;
            var campaignCount = businesses.filter(function(b) { return b.outreach_status === 'in_campaign'; }).length;
            var wonCount = businesses.filter(function(b) { return b.outreach_status === 'replied' || b.outreach_status === 'won'; }).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statNew').textContent = newCount;
            document.getElementById('statCampaign').textContent = campaignCount;
            document.getElementById('statWon').textContent = wonCount;
            document.getElementById('pipelineCount').textContent = total + ' businesses';

            // Pipeline table
            var html = '<div class="table-wrap"><table><thead><tr>';
            html += '<th>Name</th><th>Email</th><th>Phone</th><th>Type</th><th>City</th><th>Status</th><th>Source</th><th>Created</th>';
            html += '</tr></thead><tbody>';

            if (businesses.length === 0) {
                html += '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#64748B;">No businesses found</td></tr>';
            } else {
                businesses.forEach(function(b) {
                    html += '<tr>';
                    html += '<td><strong>' + escHtml(b.name) + '</strong></td>';
                    html += '<td>' + (b.email ? '<a href="mailto:' + escHtml(b.email) + '">' + escHtml(b.email) + '</a>' : '—') + '</td>';
                    html += '<td>' + (b.phone ? '<a href="tel:' + escHtml(b.phone) + '">' + escHtml(b.phone) + '</a>' : '—') + '</td>';
                    html += '<td>' + escHtml(b.type || b.business_type || '—') + '</td>';
                    html += '<td>' + escHtml(b.city || '—') + '</td>';
                    html += '<td><span class="status-badge ' + statusClass(b.outreach_status) + '">' + statusLabel(b.outreach_status) + '</span></td>';
                    html += '<td>' + escHtml(b.source || '—') + '</td>';
                    html += '<td>' + fmtDate(b.created_at) + '</td>';
                    html += '</tr>';
                });
            }
            html += '</tbody></table></div>';
            document.getElementById('pipelineBody').innerHTML = html;

            // Build lookup map for business names
            var bizMap = {};
            businesses.forEach(function(b) { bizMap[b.id] = b.name; });

            // Activity table
            var aHtml = '<div class="table-wrap"><table><thead><tr>';
            aHtml += '<th>Date</th><th>Business</th><th>Subject</th><th>Status</th>';
            aHtml += '</tr></thead><tbody>';

            if (logs.length === 0) {
                aHtml += '<tr><td colspan="4" style="text-align:center;padding:2rem;color:#64748B;">No outreach logs found</td></tr>';
            } else {
                logs.forEach(function(log) {
                    aHtml += '<tr>';
                    aHtml += '<td>' + fmtDate(log.created_at || log.sent_at) + '</td>';
                    aHtml += '<td>' + escHtml(bizMap[log.business_id] || '—') + '</td>';
                    aHtml += '<td>' + escHtml(log.subject || '—') + '</td>';
                    aHtml += '<td><span class="status-badge ' + statusClass(log.status) + '">' + statusLabel(log.status || log.result) + '</span></td>';
                    aHtml += '</tr>';
                });
            }
            aHtml += '</tbody></table></div>';
            document.getElementById('activityBody').innerHTML = aHtml;

            // Update timestamp
            document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();

        } catch (err) {
            console.error('Dashboard load error:', err);
            var errHtml = '<div class="loading-overlay" style="color:#DC2626;">Failed to load data. Check console for details.</div>';
            document.getElementById('pipelineBody').innerHTML = errHtml;
            document.getElementById('activityBody').innerHTML = errHtml;
            document.getElementById('lastUpdated').textContent = 'Error loading data';
            document.getElementById('liveIndicator').style.background = '#EF4444';
        }
    }

    // Initial load
    loadDashboard();

    // Auto-refresh every 60 seconds
    setInterval(loadDashboard, 60000);
    </script>
</body>
</html>
