<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="formGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.06">
    <circle cx="20" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="50" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="80" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="110" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="140" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="20" cy="50" r="1.5" fill="#1E293B"/>
    <circle cx="50" cy="50" r="1.5" fill="#1E293B"/>
    <circle cx="80" cy="50" r="1.5" fill="#1E293B"/>
    <circle cx="110" cy="50" r="1.5" fill="#1E293B"/>
    <circle cx="140" cy="50" r="1.5" fill="#1E293B"/>
    <circle cx="20" cy="80" r="1.5" fill="#1E293B"/>
    <circle cx="50" cy="80" r="1.5" fill="#1E293B"/>
    <circle cx="80" cy="80" r="1.5" fill="#1E293B"/>
    <circle cx="260" cy="260" r="1.5" fill="#1E293B"/>
    <circle cx="290" cy="260" r="1.5" fill="#1E293B"/>
    <circle cx="320" cy="260" r="1.5" fill="#1E293B"/>
    <circle cx="350" cy="260" r="1.5" fill="#1E293B"/>
    <circle cx="380" cy="260" r="1.5" fill="#1E293B"/>
    <circle cx="260" cy="280" r="1.5" fill="#1E293B"/>
    <circle cx="290" cy="280" r="1.5" fill="#1E293B"/>
    <circle cx="320" cy="280" r="1.5" fill="#1E293B"/>
    <circle cx="350" cy="280" r="1.5" fill="#1E293B"/>
    <circle cx="380" cy="280" r="1.5" fill="#1E293B"/>
  </g>

  <!-- === LEFT SIDE: Form Document === -->
  <g filter="url(#shadow)">
    <rect x="30" y="55" width="120" height="160" rx="8" fill="white" stroke="#2563EB" stroke-width="2"/>
    <!-- Form header bar -->
    <rect x="30" y="55" width="120" height="28" rx="8" fill="url(#formGrad)"/>
    <rect x="30" y="72" width="120" height="11" fill="url(#formGrad)"/>
    <!-- Header dots -->
    <circle cx="46" cy="69" r="3" fill="white" opacity="0.8"/>
    <circle cx="56" cy="69" r="3" fill="white" opacity="0.6"/>
    <circle cx="66" cy="69" r="3" fill="white" opacity="0.4"/>
    <!-- Form field lines -->
    <rect x="44" y="96" width="50" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
    <rect x="44" y="108" width="92" height="10" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="44" y="128" width="50" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
    <rect x="44" y="140" width="92" height="10" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="44" y="160" width="50" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
    <rect x="44" y="172" width="92" height="10" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <!-- Submit button -->
    <rect x="64" y="194" width="52" height="14" rx="7" fill="url(#formGrad)"/>
  </g>

  <!-- === INPUT ICONS: Envelope === -->
  <g filter="url(#shadowSm)">
    <rect x="18" y="240" width="36" height="28" rx="6" fill="white" stroke="#0EA5E9" stroke-width="2"/>
    <polyline points="22,246 36,256 50,246" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="22" y1="262" x2="30" y2="255" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="50" y1="262" x2="42" y2="255" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Phone icon -->
  <g filter="url(#shadowSm)">
    <rect x="68" y="238" width="30" height="32" rx="6" fill="white" stroke="#2563EB" stroke-width="2"/>
    <path d="M78,248 C78,248 76,250 76,253 C76,256 78,258 81,260 C84,262 87,263 89,261 C89,261 91,259 89,257 C87,255 85,256 84,257 C83,258 81,256 80,255 C79,254 78,252 79,251 C80,250 81,248 79,246 C77,244 76,247 78,248Z" fill="#2563EB" opacity="0.8"/>
  </g>

  <!-- Web icon (globe) -->
  <g filter="url(#shadowSm)">
    <circle cx="130" cy="254" r="16" fill="white" stroke="#0EA5E9" stroke-width="2"/>
    <ellipse cx="130" cy="254" rx="8" ry="14" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6"/>
    <line x1="114" y1="254" x2="146" y2="254" stroke="#0EA5E9" stroke-width="1.5" opacity="0.5"/>
    <line x1="118" y1="246" x2="142" y2="246" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
    <line x1="118" y1="262" x2="142" y2="262" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Dashed lines from input icons to form -->
  <line x1="36" y1="238" x2="60" y2="218" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="83" y1="238" x2="85" y2="218" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="130" y1="238" x2="115" y2="218" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- === CENTER: Flow Arrow === -->
  <g opacity="0.9">
    <path d="M160,120 C180,120 185,120 200,120" stroke="url(#arrowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M160,140 C180,140 190,140 210,140" stroke="url(#arrowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M160,160 C180,160 185,160 200,160" stroke="url(#arrowGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Animated dots on flow lines -->
  <circle r="3" fill="#2563EB" opacity="0.8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M160,120 C180,120 185,120 200,120"/>
  </circle>
  <circle r="3" fill="#0EA5E9" opacity="0.8">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M160,140 C180,140 190,140 210,140"/>
  </circle>
  <circle r="3" fill="#2563EB" opacity="0.8">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M160,160 C180,160 185,160 200,160"/>
  </circle>

  <!-- === CENTER: Funnel === -->
  <g filter="url(#shadow)">
    <path d="M195,90 L235,90 L225,140 L215,180 L205,140 Z" fill="url(#funnelGrad)" opacity="0.15" stroke="#2563EB" stroke-width="2" stroke-linejoin="round"/>
    <path d="M199,98 L231,98" stroke="white" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <path d="M203,110 L227,110" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <path d="M207,122 L223,122" stroke="white" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Funnel output lines -->
  <path d="M215,180 C220,190 240,190 255,175" stroke="#10B981" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M215,180 C220,195 245,200 255,200" stroke="#10B981" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M215,180 C220,200 240,210 255,225" stroke="#10B981" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- === RIGHT SIDE: Organized Cards === -->
  <!-- Card 1 -->
  <g filter="url(#shadowSm)">
    <rect x="258" y="58" width="120" height="42" rx="8" fill="url(#cardGrad)" stroke="#10B981" stroke-width="2"/>
    <!-- Avatar circle -->
    <circle cx="278" cy="79" r="12" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="278" cy="76" r="4" fill="#10B981" opacity="0.5"/>
    <path d="M270,86 C270,82 274,79 278,79 C282,79 286,82 286,86" fill="#10B981" opacity="0.3"/>
    <!-- Data lines -->
    <rect x="296" y="68" width="50" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
    <rect x="296" y="76" width="70" height="3" rx="1.5" fill="#0EA5E9" opacity="0.3"/>
    <rect x="296" y="84" width="40" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
    <!-- Status dot -->
    <circle cx="368" cy="68" r="4" fill="#10B981"/>
  </g>

  <!-- Card 2 -->
  <g filter="url(#shadowSm)">
    <rect x="258" y="110" width="120" height="42" rx="8" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="278" cy="131" r="12" fill="#0EA5E9" opacity="0.15" stroke="#0EA5E9" stroke-width="1.5"/>
    <circle cx="278" cy="128" r="4" fill="#0EA5E9" opacity="0.5"/>
    <path d="M270,138 C270,134 274,131 278,131 C282,131 286,134 286,138" fill="#0EA5E9" opacity="0.3"/>
    <rect x="296" y="120" width="55" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
    <rect x="296" y="128" width="65" height="3" rx="1.5" fill="#0EA5E9" opacity="0.3"/>
    <rect x="296" y="136" width="45" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
    <circle cx="368" cy="120" r="4" fill="#0EA5E9"/>
  </g>

  <!-- Card 3 -->
  <g filter="url(#shadowSm)">
    <rect x="258" y="162" width="120" height="42" rx="8" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="2"/>
    <circle cx="278" cy="183" r="12" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="278" cy="180" r="4" fill="#2563EB" opacity="0.5"/>
    <path d="M270,190 C270,186 274,183 278,183 C282,183 286,186 286,190" fill="#2563EB" opacity="0.3"/>
    <rect x="296" y="172" width="48" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
    <rect x="296" y="180" width="72" height="3" rx="1.5" fill="#2563EB" opacity="0.3"/>
    <rect x="296" y="188" width="38" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
    <circle cx="368" cy="172" r="4" fill="#2563EB"/>
  </g>

  <!-- Card 4 -->
  <g filter="url(#shadowSm)">
    <rect x="258" y="214" width="120" height="42" rx="8" fill="url(#cardGrad)" stroke="#10B981" stroke-width="2"/>
    <circle cx="278" cy="235" r="12" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="278" cy="232" r="4" fill="#10B981" opacity="0.5"/>
    <path d="M270,242 C270,238 274,235 278,235 C282,235 286,238 286,242" fill="#10B981" opacity="0.3"/>
    <rect x="296" y="224" width="56" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
    <rect x="296" y="232" width="60" height="3" rx="1.5" fill="#10B981" opacity="0.3"/>
    <rect x="296" y="240" width="42" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
    <circle cx="368" cy="224" r="4" fill="#10B981"/>
  </g>

  <!-- Decorative accent circles -->
  <circle cx="380" cy="30" r="18" fill="#2563EB" opacity="0.06"/>
  <circle cx="370" cy="40" r="10" fill="#0EA5E9" opacity="0.08"/>
  <circle cx="20" cy="30" r="12" fill="#0EA5E9" opacity="0.06"/>
</svg>