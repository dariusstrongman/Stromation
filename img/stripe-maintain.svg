<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="32" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#00E5FF" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/><line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Wrench/gear icon -->
  <g transform="translate(256,195)" fill="none" stroke="#2563EB" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="70" opacity="0.15" fill="#2563EB" stroke="none"/>
    <!-- Gear outer -->
    <path d="M0,-50 L8,-48 L12,-42 L18,-44 L26,-38 L24,-30 L28,-24 L36,-24 L40,-14 L34,-8 L36,0 L42,4 L38,14 L30,14 L28,22 L34,28 L26,36 L20,30 L12,34 L12,42 L0,44 L-2,36 L-10,34 L-16,40 L-24,34 L-20,26 L-26,20 L-34,22 L-38,12 L-30,8 L-30,0 L-38,-6 L-34,-16 L-26,-14 L-22,-22 L-28,-28 L-20,-36 L-14,-30 L-8,-34 L-8,-44 Z" fill="none" stroke="#2563EB" stroke-width="3"/>
    <!-- Gear inner circle -->
    <circle cx="0" cy="0" r="18"/>
    <!-- Wrench -->
    <g transform="rotate(45)">
      <rect x="-5" y="-35" width="10" height="30" rx="3" fill="#2563EB" stroke="none" opacity="0.7"/>
      <circle cx="0" cy="-35" r="10" fill="none" stroke="#2563EB" stroke-width="4"/>
    </g>
  </g>
  <!-- Price -->
  <text x="256" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#2563EB">$149/mo</text>
  <!-- Tier name -->
  <text x="256" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800" fill="white" letter-spacing="2">MAINTAIN</text>
  <!-- Brand -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="500" fill="#64748B" letter-spacing="4">STROMATION</text>
  <!-- Accent line -->
  <rect x="206" y="350" width="100" height="3" rx="1.5" fill="#2563EB" opacity="0.6"/>
</svg>