<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="gear1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="gear2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="gear3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#0EA5E9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#1E293B" stroke-width="0.5">
    <line x1="0" y1="30" x2="400" y2="30"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="90" x2="400" y2="90"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="270" x2="400" y2="270"/>
    <line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="280" y1="0" x2="280" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/>
  </g>

  <!-- === CONNECTION LINES (behind gears) === -->
  <!-- From gear 1 to hub -->
  <path d="M110,100 C140,100 150,130 175,140" stroke="#2563EB" stroke-width="2" fill="none" opacity="0.25" stroke-dasharray="6,4"/>
  <!-- From gear 2 to hub -->
  <path d="M290,80 C260,80 240,120 225,140" stroke="#0EA5E9" stroke-width="2" fill="none" opacity="0.25" stroke-dasharray="6,4"/>
  <!-- From hub to gear 3 -->
  <path d="M210,175 C220,200 250,210 270,210" stroke="#10B981" stroke-width="2" fill="none" opacity="0.25" stroke-dasharray="6,4"/>
  <!-- From hub to gear 4 -->
  <path d="M190,175 C170,200 140,215 120,220" stroke="#2563EB" stroke-width="2" fill="none" opacity="0.25" stroke-dasharray="6,4"/>

  <!-- Animated data dots on lines -->
  <circle r="3.5" fill="#2563EB" opacity="0.7" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M110,100 C140,100 150,130 175,140"/>
  </circle>
  <circle r="3.5" fill="#0EA5E9" opacity="0.7" filter="url(#glow)">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M290,80 C260,80 240,120 225,140"/>
  </circle>
  <circle r="3.5" fill="#10B981" opacity="0.7" filter="url(#glow)">
    <animateMotion dur="2.8s" repeatCount="indefinite" path="M210,175 C220,200 250,210 270,210"/>
  </circle>
  <circle r="3.5" fill="#2563EB" opacity="0.7" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M190,175 C170,200 140,215 120,220"/>
  </circle>

  <!-- === GEAR 1 (top-left, large) === -->
  <g filter="url(#shadow)">
    <g transform="translate(80,85)">
      <animateTransform attributeName="transform" type="rotate" from="0 80 85" to="360 80 85" dur="12s" repeatCount="indefinite" additive="sum"/>
      <path d="M0,-38 L6,-36 L8,-28 L14,-27 L18,-34 L24,-30 L22,-23 L27,-19 L33,-22 L36,-16 L29,-12 L30,-6 L38,0 L36,6 L28,8 L27,14 L34,18 L30,24 L23,22 L19,27 L22,33 L16,36 L12,29 L6,30 L0,38 L-6,36 L-8,28 L-14,27 L-18,34 L-24,30 L-22,23 L-27,19 L-33,22 L-36,16 L-29,12 L-30,6 L-38,0 L-36,-6 L-28,-8 L-27,-14 L-34,-18 L-30,-24 L-23,-22 L-19,-27 L-22,-33 L-16,-36 L-12,-29 L-6,-30 Z" fill="url(#gear1Grad)" opacity="0.85" stroke="#1D4ED8" stroke-width="1"/>
      <circle cx="0" cy="0" r="14" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="#2563EB" opacity="0.3"/>
    </g>
  </g>

  <!-- === GEAR 2 (top-right, medium) === -->
  <g filter="url(#shadow)">
    <g transform="translate(305,70)">
      <animateTransform attributeName="transform" type="rotate" from="360 305 70" to="0 305 70" dur="9s" repeatCount="indefinite" additive="sum"/>
      <path d="M0,-30 L5,-28 L6,-22 L11,-21 L14,-27 L19,-24 L17,-18 L21,-15 L26,-17 L28,-12 L22,-9 L23,-4 L30,0 L28,5 L22,6 L21,11 L27,14 L24,19 L18,17 L15,21 L17,26 L12,28 L9,22 L4,23 L0,30 L-5,28 L-6,22 L-11,21 L-14,27 L-19,24 L-17,18 L-21,15 L-26,17 L-28,12 L-22,9 L-23,4 L-30,0 L-28,-5 L-22,-6 L-21,-11 L-27,-14 L-24,-19 L-18,-17 L-15,-21 L-17,-26 L-12,-28 L-9,-22 L-4,-23 Z" fill="url(#gear2Grad)" opacity="0.85" stroke="#0284C7" stroke-width="1"/>
      <circle cx="0" cy="0" r="11" fill="#F8FAFC" stroke="#0EA5E9" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#0EA5E9" opacity="0.3"/>
    </g>
  </g>

  <!-- === GEAR 3 (bottom-right, small) === -->
  <g filter="url(#shadow)">
    <g transform="translate(300,215)">
      <animateTransform attributeName="transform" type="rotate" from="0 300 215" to="360 300 215" dur="7s" repeatCount="indefinite" additive="sum"/>
      <path d="M0,-24 L4,-22 L5,-17 L9,-17 L11,-22 L15,-19 L14,-14 L17,-12 L21,-14 L22,-10 L18,-7 L18,-3 L24,0 L22,4 L17,5 L17,9 L22,11 L19,15 L14,14 L12,17 L14,21 L10,22 L7,18 L3,18 L0,24 L-4,22 L-5,17 L-9,17 L-11,22 L-15,19 L-14,14 L-17,12 L-21,14 L-22,10 L-18,7 L-18,3 L-24,0 L-22,-4 L-17,-5 L-17,-9 L-22,-11 L-19,-15 L-14,-14 L-12,-17 L-14,-21 L-10,-22 L-7,-18 L-3,-18 Z" fill="url(#gear3Grad)" opacity="0.85" stroke="#059669" stroke-width="1"/>
      <circle cx="0" cy="0" r="9" fill="#F8FAFC" stroke="#10B981" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#10B981" opacity="0.3"/>
    </g>
  </g>

  <!-- === GEAR 4 (bottom-left, medium) === -->
  <g filter="url(#shadow)">
    <g transform="translate(95,230)">
      <animateTransform attributeName="transform" type="rotate" from="360 95 230" to="0 95 230" dur="10s" repeatCount="indefinite" additive="sum"/>
      <path d="M0,-26 L4,-24 L5,-19 L10,-18 L12,-24 L16,-21 L15,-15 L19,-13 L23,-15 L24,-11 L19,-8 L20,-3 L26,0 L24,4 L19,5 L18,10 L24,12 L21,16 L15,15 L13,19 L15,23 L11,24 L8,19 L3,20 L0,26 L-4,24 L-5,19 L-10,18 L-12,24 L-16,21 L-15,15 L-19,13 L-23,15 L-24,11 L-19,8 L-20,3 L-26,0 L-24,-4 L-19,-5 L-18,-10 L-24,-12 L-21,-16 L-15,-15 L-13,-19 L-15,-23 L-11,-24 L-8,-19 L-3,-20 Z" fill="url(#gear1Grad)" opacity="0.7" stroke="#1D4ED8" stroke-width="1"/>
      <circle cx="0" cy="0" r="10" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
      <circle cx="0" cy="0" r="3.5" fill="#2563EB" opacity="0.3"/>
    </g>
  </g>

  <!-- === CENTRAL PROCESS HUB === -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="155" r="32" fill="white" stroke="url(#hubGrad)" stroke-width="2.5"/>
    <circle cx="200" cy="155" r="26" fill="url(#hubGrad)" opacity="0.08"/>
    <!-- Hub icon: interconnected nodes -->
    <circle cx="200" cy="143" r="4" fill="#2563EB" opacity="0.8"/>
    <circle cx="189" cy="160" r="4" fill="#0EA5E9" opacity="0.8"/>
    <circle cx="211" cy="160" r="4" fill="#10B981" opacity="0.8"/>
    <circle cx="200" cy="170" r="3" fill="#2563EB" opacity="0.5"/>
    <!-- Hub inner connections -->
    <line x1="200" y1="147" x2="189" y2="156" stroke="#1E293B" stroke-width="1.5" opacity="0.3"/>
    <line x1="200" y1="147" x2="211" y2="156" stroke="#1E293B" stroke-width="1.5" opacity="0.3"/>
    <line x1="189" y1="160" x2="211" y2="160" stroke="#1E293B" stroke-width="1.5" opacity="0.3"/>
    <line x1="189" y1="164" x2="200" y2="170" stroke="#1E293B" stroke-width="1" opacity="0.2"/>
    <line x1="211" y1="164" x2="200" y2="170" stroke="#1E293B" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- === TOOL ICONS === -->
  <!-- Spreadsheet (top-left area) -->
  <g filter="url(#shadowSm)" transform="translate(35, 20)">
    <rect x="0" y="0" width="34" height="28" rx="4" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <line x1="12" y1="0" x2="12" y2="28" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
    <line x1="23" y1="0" x2="23" y2="28" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="9" x2="34" y2="9" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="18" x2="34" y2="18" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
    <rect x="1" y="1" width="11" height="8" rx="1" fill="#2563EB" opacity="0.12"/>
  </g>
  <path d="M52,48 C55,55 65,70 80,80" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Calendar (top-right area) -->
  <g filter="url(#shadowSm)" transform="translate(340, 15)">
    <rect x="0" y="4" width="34" height="28" rx="4" fill="white" stroke="#0EA5E9" stroke-width="1.5"/>
    <rect x="0" y="4" width="34" height="10" rx="4" fill="#0EA5E9" opacity="0.15"/>
    <rect x="0" y="10" width="34" height="4" fill="#0EA5E9" opacity="0.15"/>
    <line x1="8" y1="0" x2="8" y2="8" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round"/>
    <line x1="26" y1="0" x2="26" y2="8" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round"/>
    <rect x="5" y="18" width="5" height="4" rx="1" fill="#0EA5E9" opacity="0.3"/>
    <rect x="14" y="18" width="5" height="4" rx="1" fill="#0EA5E9" opacity="0.3"/>
    <rect x="23" y="18" width="5" height="4" rx="1" fill="#2563EB" opacity="0.5"/>
    <rect x="5" y="25" width="5" height="4" rx="1" fill="#0EA5E9" opacity="0.2"/>
    <rect x="14" y="25" width="5" height="4" rx="1" fill="#0EA5E9" opacity="0.2"/>
  </g>
  <path d="M345,43 C330,50 315,60 305,70" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Document (bottom area) -->
  <g filter="url(#shadowSm)" transform="translate(183, 250)">
    <rect x="0" y="0" width="28" height="34" rx="4" fill="white" stroke="#10B981" stroke-width="1.5"/>
    <path d="M18,0 L28,10" stroke="#10B981" stroke-width="1" opacity="0.3"/>
    <rect x="18" y="0" width="10" height="10" rx="2" fill="#10B981" opacity="0.1"/>
    <rect x="5" y="14" width="18" height="2" rx="1" fill="#1E293B" opacity="0.15"/>
    <rect x="5" y="19" width="14" height="2" rx="1" fill="#1E293B" opacity="0.12"/>
    <rect x="5" y="24" width="16" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
    <rect x="5" y="29" width="10" height="2" rx="1" fill="#1E293B" opacity="0.08"/>
  </g>
  <path d="M197,250 C198,230 199,200 200,185" stroke="#10B981" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- === DECORATIVE ELEMENTS === -->
  <!-- Floating particles -->
  <circle cx="160" cy="30" r="3" fill="#2563EB" opacity="0.1"/>
  <circle cx="240" cy="25" r="4" fill="#0EA5E9" opacity="0.08"/>
  <circle cx="350" cy="270" r="5" fill="#10B981" opacity="0.06"/>
  <circle cx="30" cy="270" r="4" fill="#2563EB" opacity="0.08"/>
  <circle cx="50" cy="150" r="2.5" fill="#0EA5E9" opacity="0.1"/>
  <circle cx="350" cy="150" r="2.5" fill="#2563EB" opacity="0.1"/>

  <!-- Corner accent arcs -->
  <path d="M0,40 Q0,0 40,0" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.08"/>
  <path d="M400,260 Q400,300 360,300" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.08"/>
</svg>