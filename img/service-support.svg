<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle dot pattern -->
  <g opacity="0.04">
    <circle cx="20" cy="20" r="1" fill="#1E293B"/>
    <circle cx="40" cy="20" r="1" fill="#1E293B"/>
    <circle cx="60" cy="20" r="1" fill="#1E293B"/>
    <circle cx="80" cy="20" r="1" fill="#1E293B"/>
    <circle cx="20" cy="40" r="1" fill="#1E293B"/>
    <circle cx="40" cy="40" r="1" fill="#1E293B"/>
    <circle cx="60" cy="40" r="1" fill="#1E293B"/>
    <circle cx="80" cy="40" r="1" fill="#1E293B"/>
    <circle cx="320" cy="260" r="1" fill="#1E293B"/>
    <circle cx="340" cy="260" r="1" fill="#1E293B"/>
    <circle cx="360" cy="260" r="1" fill="#1E293B"/>
    <circle cx="380" cy="260" r="1" fill="#1E293B"/>
    <circle cx="320" cy="280" r="1" fill="#1E293B"/>
    <circle cx="340" cy="280" r="1" fill="#1E293B"/>
    <circle cx="360" cy="280" r="1" fill="#1E293B"/>
    <circle cx="380" cy="280" r="1" fill="#1E293B"/>
  </g>

  <!-- === MAIN CHAT BUBBLE WITH AI BRAIN === -->
  <g filter="url(#shadow)">
    <!-- Large chat bubble -->
    <path d="M130,25 L280,25 Q300,25 300,45 L300,115 Q300,135 280,135 L220,135 L200,155 L195,135 L130,135 Q110,135 110,115 L110,45 Q110,25 130,25 Z" fill="url(#bubbleGrad)" stroke="url(#blueGrad)" stroke-width="2"/>

    <!-- AI Brain icon inside bubble -->
    <g transform="translate(200, 75)">
      <!-- Brain outline -->
      <path d="M-18,-15 C-18,-22 -12,-28 -5,-28 C-2,-28 0,-27 2,-25 C4,-28 8,-30 12,-30 C19,-30 25,-24 25,-17 C25,-14 24,-11 22,-9 C24,-7 26,-3 26,2 C26,8 23,13 18,15 C18,19 15,22 11,23 C7,24 3,23 0,20 C-3,23 -7,24 -11,23 C-15,22 -18,19 -18,15 C-23,13 -26,8 -26,2 C-26,-3 -24,-7 -22,-9 C-24,-11 -25,-14 -25,-17 C-25,-22 -22,-15 -18,-15 Z" fill="url(#blueGrad)" opacity="0.12" stroke="#2563EB" stroke-width="2"/>
      <!-- Brain circuit lines -->
      <line x1="-8" y1="-18" x2="-8" y2="15" stroke="#2563EB" stroke-width="1.5" opacity="0.3"/>
      <line x1="5" y1="-22" x2="5" y2="18" stroke="#0EA5E9" stroke-width="1.5" opacity="0.3"/>
      <line x1="-18" y1="-2" x2="18" y2="-2" stroke="#2563EB" stroke-width="1.5" opacity="0.25"/>
      <line x1="-15" y1="8" x2="15" y2="8" stroke="#0EA5E9" stroke-width="1.5" opacity="0.25"/>
      <!-- Neural nodes -->
      <circle cx="-8" cy="-10" r="3" fill="#2563EB" opacity="0.7"/>
      <circle cx="5" cy="-15" r="3" fill="#0EA5E9" opacity="0.7"/>
      <circle cx="-8" cy="5" r="3" fill="#0EA5E9" opacity="0.7"/>
      <circle cx="5" cy="0" r="3" fill="#2563EB" opacity="0.7"/>
      <circle cx="-15" cy="-2" r="2.5" fill="#2563EB" opacity="0.5"/>
      <circle cx="15" cy="8" r="2.5" fill="#0EA5E9" opacity="0.5"/>
      <circle cx="-8" cy="15" r="2.5" fill="#10B981" opacity="0.6"/>
      <circle cx="5" cy="12" r="2.5" fill="#10B981" opacity="0.6"/>
      <!-- Cross connections -->
      <line x1="-8" y1="-10" x2="5" y2="-15" stroke="#1E293B" stroke-width="1" opacity="0.15"/>
      <line x1="-8" y1="-10" x2="5" y2="0" stroke="#1E293B" stroke-width="1" opacity="0.15"/>
      <line x1="-8" y1="5" x2="5" y2="0" stroke="#1E293B" stroke-width="1" opacity="0.15"/>
      <line x1="-8" y1="5" x2="5" y2="12" stroke="#1E293B" stroke-width="1" opacity="0.15"/>
    </g>

    <!-- Pulse rings around brain -->
    <circle cx="200" cy="75" r="30" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.15">
      <animate attributeName="r" values="30;40;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="75" r="35" fill="none" stroke="#0EA5E9" stroke-width="0.8" opacity="0.1">
      <animate attributeName="r" values="35;48;35" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.02;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Small decorative chat bubbles -->
  <g filter="url(#shadowSm)" opacity="0.7">
    <rect x="70" y="50" width="28" height="18" rx="9" fill="white" stroke="#0EA5E9" stroke-width="1.5"/>
    <circle cx="78" cy="59" r="2" fill="#0EA5E9" opacity="0.5"/>
    <circle cx="84" cy="59" r="2" fill="#0EA5E9" opacity="0.5"/>
    <circle cx="90" cy="59" r="2" fill="#0EA5E9" opacity="0.5"/>
  </g>
  <g filter="url(#shadowSm)" opacity="0.5">
    <rect x="55" y="80" width="22" height="14" rx="7" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="62" cy="87" r="1.5" fill="#2563EB" opacity="0.4"/>
    <circle cx="67" cy="87" r="1.5" fill="#2563EB" opacity="0.4"/>
    <circle cx="72" cy="87" r="1.5" fill="#2563EB" opacity="0.4"/>
  </g>
  <g filter="url(#shadowSm)" opacity="0.6">
    <rect x="310" y="60" width="26" height="16" rx="8" fill="white" stroke="#10B981" stroke-width="1.5"/>
    <rect x="316" y="66" width="14" height="2" rx="1" fill="#10B981" opacity="0.4"/>
    <rect x="316" y="71" width="10" height="2" rx="1" fill="#10B981" opacity="0.3"/>
  </g>

  <!-- === FLOW SECTION: Customer -> AI -> Resolution === -->

  <!-- Step 1: Customer (Person Silhouette) -->
  <g filter="url(#shadowSm)">
    <circle cx="70" cy="210" r="28" fill="white" stroke="#1E293B" stroke-width="2" opacity="0.9"/>
    <circle cx="70" cy="210" r="26" fill="#2563EB" opacity="0.05"/>
    <!-- Person silhouette -->
    <circle cx="70" cy="200" r="9" fill="#1E293B" opacity="0.2" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.3"/>
    <path d="M54,228 C54,218 61,212 70,212 C79,212 86,218 86,228" fill="#1E293B" opacity="0.15" stroke="#1E293B" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- Small question mark -->
    <circle cx="88" cy="195" r="8" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
    <path d="M85,192 C85,190 87,188 89,188 C91,188 93,190 93,192 C93,194 91,194 89,196" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="89" cy="199" r="1" fill="#2563EB"/>
  </g>

  <!-- Arrow 1: Customer to AI -->
  <g>
    <path d="M100,210 C120,210 130,210 148,210" stroke="url(#blueGrad)" stroke-width="2" fill="none"/>
    <polygon points="148,205 158,210 148,215" fill="#2563EB" opacity="0.7"/>
    <!-- Flow dots -->
    <circle r="2.5" fill="#2563EB" opacity="0.6">
      <animateMotion dur="2s" repeatCount="indefinite" path="M100,210 C120,210 130,210 148,210"/>
    </circle>
  </g>

  <!-- Step 2: AI Processing (Brain/Circuit) -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="210" r="32" fill="white" stroke="url(#blueGrad)" stroke-width="2.5"/>
    <circle cx="200" cy="210" r="28" fill="url(#blueGrad)" opacity="0.06"/>
    <!-- Circuit brain mini -->
    <g transform="translate(200, 210)">
      <!-- Central processor -->
      <rect x="-10" y="-10" width="20" height="20" rx="4" fill="url(#blueGrad)" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
      <!-- Circuit traces -->
      <line x1="-10" y1="-4" x2="-18" y2="-4" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="-10" y1="4" x2="-18" y2="4" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="10" y1="-4" x2="18" y2="-4" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="10" y1="4" x2="18" y2="4" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="-4" y1="-10" x2="-4" y2="-18" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="4" y1="-10" x2="4" y2="-18" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="-4" y1="10" x2="-4" y2="18" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <line x1="4" y1="10" x2="4" y2="18" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <!-- Circuit nodes -->
      <circle cx="-18" cy="-4" r="2" fill="#2563EB" opacity="0.6"/>
      <circle cx="-18" cy="4" r="2" fill="#0EA5E9" opacity="0.6"/>
      <circle cx="18" cy="-4" r="2" fill="#2563EB" opacity="0.6"/>
      <circle cx="18" cy="4" r="2" fill="#0EA5E9" opacity="0.6"/>
      <circle cx="-4" cy="-18" r="2" fill="#2563EB" opacity="0.6"/>
      <circle cx="4" cy="-18" r="2" fill="#0EA5E9" opacity="0.6"/>
      <circle cx="-4" cy="18" r="2" fill="#0EA5E9" opacity="0.6"/>
      <circle cx="4" cy="18" r="2" fill="#2563EB" opacity="0.6"/>
      <!-- Inner dots -->
      <circle cx="-3" cy="-3" r="2" fill="#2563EB" opacity="0.5"/>
      <circle cx="3" cy="3" r="2" fill="#0EA5E9" opacity="0.5"/>
      <circle cx="3" cy="-3" r="2" fill="#10B981" opacity="0.4"/>
      <circle cx="-3" cy="3" r="2" fill="#10B981" opacity="0.4"/>
    </g>
    <!-- Processing pulse -->
    <circle cx="200" cy="210" r="32" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.2">
      <animate attributeName="r" values="32;38;32" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.05;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrow 2: AI to Resolution -->
  <g>
    <path d="M234,210 C250,210 260,210 278,210" stroke="url(#blueGrad)" stroke-width="2" fill="none"/>
    <polygon points="278,205 288,210 278,215" fill="#10B981" opacity="0.7"/>
    <circle r="2.5" fill="#10B981" opacity="0.6">
      <animateMotion dur="2s" repeatCount="indefinite" path="M234,210 C250,210 260,210 278,210"/>
    </circle>
  </g>

  <!-- Step 3: Resolution (Checkmark) -->
  <g filter="url(#shadow)">
    <circle cx="325" cy="210" r="28" fill="white" stroke="url(#greenGrad)" stroke-width="2.5"/>
    <circle cx="325" cy="210" r="24" fill="#10B981" opacity="0.08"/>
    <!-- Checkmark -->
    <path d="M310,212 L320,222 L340,198" fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Success sparkles -->
    <line x1="348" y1="195" x2="352" y2="191" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="354" y1="200" x2="358" y2="200" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="350" y1="207" x2="354" y2="210" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- === TICKET ROUTING DIAGRAM (bottom) === -->
  <!-- Routing lines from center -->
  <g opacity="0.3">
    <path d="M200,244 L140,270" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M200,244 L200,275" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3"/>
    <path d="M200,244 L260,270" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Ticket cards -->
  <g filter="url(#shadowSm)">
    <rect x="120" y="264" width="40" height="22" rx="4" fill="white" stroke="#0EA5E9" stroke-width="1.5"/>
    <rect x="125" y="269" width="20" height="2.5" rx="1" fill="#0EA5E9" opacity="0.4"/>
    <rect x="125" y="274" width="14" height="2.5" rx="1" fill="#1E293B" opacity="0.12"/>
    <circle cx="153" cy="270" r="3" fill="#0EA5E9" opacity="0.3"/>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="180" y="270" width="40" height="22" rx="4" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="185" y="275" width="22" height="2.5" rx="1" fill="#2563EB" opacity="0.4"/>
    <rect x="185" y="280" width="16" height="2.5" rx="1" fill="#1E293B" opacity="0.12"/>
    <circle cx="213" cy="276" r="3" fill="#2563EB" opacity="0.3"/>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="240" y="264" width="40" height="22" rx="4" fill="white" stroke="#10B981" stroke-width="1.5"/>
    <rect x="245" y="269" width="18" height="2.5" rx="1" fill="#10B981" opacity="0.4"/>
    <rect x="245" y="274" width="12" height="2.5" rx="1" fill="#1E293B" opacity="0.12"/>
    <circle cx="273" cy="270" r="3" fill="#10B981" opacity="0.3"/>
  </g>

  <!-- Decorative accents -->
  <circle cx="380" cy="25" r="15" fill="#2563EB" opacity="0.05"/>
  <circle cx="20" cy="280" r="12" fill="#0EA5E9" opacity="0.05"/>
  <path d="M0,25 Q0,0 25,0" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.06"/>
  <path d="M400,275 Q400,300 375,300" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.06"/>
</svg>