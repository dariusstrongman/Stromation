<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Code brackets -->
  <!-- Left bracket < -->
  <polyline points="30,28 18,40 30,52" fill="none" stroke="url(#buildGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <polyline points="50,28 62,40 50,52" fill="none" stroke="url(#buildGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash in middle -->
  <line x1="44" y1="26" x2="36" y2="54" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Wrench overlaid (bottom-right) -->
  <g transform="translate(52,52) rotate(-45)">
    <!-- Wrench handle -->
    <rect x="-3" y="0" width="6" height="18" rx="2.5" fill="url(#buildGrad)"/>
    <!-- Wrench head -->
    <path d="M-6,-5 Q-6,-10 -3,-12 Q0,-14 3,-12 Q6,-10 6,-5 L4,-2 Q0,0 -4,-2 Z" fill="url(#buildGrad)"/>
    <!-- Wrench head cutout -->
    <path d="M-1,-12 L-1,-6 L1,-6 L1,-12" fill="#F8FAFC"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="12" cy="16" r="2" fill="#2563EB" opacity="0.15"/>
  <circle cx="68" cy="16" r="1.5" fill="#0EA5E9" opacity="0.12"/>
  <circle cx="14" cy="65" r="1.5" fill="#0EA5E9" opacity="0.1"/>
</svg>