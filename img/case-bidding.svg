<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 210" fill="none">
  <rect width="280" height="210" rx="12" fill="#F8FAFC"/>
  <!-- Document/bid icon -->
  <rect x="40" y="30" width="60" height="75" rx="6" fill="white" stroke="#2563EB" stroke-width="2"/>
  <line x1="52" y1="48" x2="88" y2="48" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="58" x2="82" y2="58" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="68" x2="86" y2="68" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="78" x2="74" y2="78" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <!-- Checkmark on doc -->
  <circle cx="78" cy="88" r="10" fill="#10B981"/>
  <path d="M73 88l3 3 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow to AI -->
  <path d="M105 67 L125 67" stroke="#2563EB" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>
  <!-- AI brain -->
  <circle cx="150" cy="67" r="22" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="150" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563EB">AI</text>
  <!-- Arrow to target -->
  <path d="M175 67 L195 67" stroke="#2563EB" stroke-width="2" stroke-linecap="round" marker-end="url(#arr)"/>
  <!-- Target/bullseye -->
  <circle cx="220" cy="67" r="22" fill="white" stroke="#2563EB" stroke-width="2"/>
  <circle cx="220" cy="67" r="14" fill="white" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="220" cy="67" r="6" fill="#2563EB"/>
  <!-- Bottom: pipeline bars -->
  <rect x="40" y="135" width="40" height="40" rx="4" fill="#DBEAFE"/>
  <rect x="90" y="145" width="40" height="30" rx="4" fill="#BFDBFE"/>
  <rect x="140" y="140" width="40" height="35" rx="4" fill="#93C5FD"/>
  <rect x="190" y="130" width="40" height="45" rx="4" fill="#2563EB"/>
  <text x="140" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#64748B">Bid Pipeline</text>
  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10" fill="none" stroke="#2563EB" stroke-width="2"/>
    </marker>
  </defs>
</svg>
