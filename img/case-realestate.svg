<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#1E293B" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="300" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- House icon -->
  <g transform="translate(45, 70)">
    <!-- House body -->
    <rect x="10" y="40" width="60" height="50" rx="4" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <!-- Roof -->
    <polygon points="40,8 0,42 80,42" fill="#2563EB" stroke="#2563EB" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="40,16 10,42 70,42" fill="#0EA5E9" opacity="0.3"/>
    <!-- Door -->
    <rect x="30" y="60" width="20" height="30" rx="3" fill="#0EA5E9" opacity="0.4" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Window -->
    <rect x="17" y="50" width="12" height="12" rx="2" fill="#0EA5E9" opacity="0.2" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="51" y="50" width="12" height="12" rx="2" fill="#0EA5E9" opacity="0.2" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Chimney -->
    <rect x="55" y="15" width="10" height="20" rx="2" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  </g>

  <!-- Location pin -->
  <g transform="translate(55, 155)">
    <path d="M20,0 C30,0 38,8 38,18 C38,32 20,48 20,48 C20,48 2,32 2,18 C2,8 10,0 20,0 Z" fill="#2563EB" opacity="0.9" stroke="#1E293B" stroke-width="1.5"/>
    <circle cx="20" cy="17" r="7" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="20" cy="17" r="3" fill="#0EA5E9"/>
  </g>

  <!-- Flow arrow from house to pipeline -->
  <g>
    <path d="M130,120 C155,120 155,110 170,110" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <polygon points="170,106 180,110 170,114" fill="#0EA5E9" opacity="0.7"/>
    <path d="M130,160 C155,160 155,150 170,150" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <polygon points="170,146 180,150 170,154" fill="#0EA5E9" opacity="0.7"/>
    <path d="M130,140 C160,140 160,190 170,190" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <polygon points="170,186 180,190 170,194" fill="#0EA5E9" opacity="0.7"/>
  </g>

  <!-- Pipeline visualization -->
  <!-- Column 1: New Leads -->
  <g transform="translate(180, 55)">
    <rect width="60" height="200" rx="8" fill="#2563EB" opacity="0.08"/>
    <rect x="2" y="2" width="56" height="24" rx="6" fill="#2563EB" opacity="0.15"/>
    <circle cx="14" cy="14" r="4" fill="#2563EB" opacity="0.5"/>
    <rect x="22" y="10" width="30" height="3" rx="1.5" fill="#2563EB" opacity="0.3"/>
    <!-- Lead cards -->
    <g transform="translate(5, 35)">
      <rect width="50" height="36" rx="5" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5"/>
      <circle cx="14" cy="13" r="6" fill="#0EA5E9" opacity="0.3"/>
      <circle cx="14" cy="11" r="3" fill="#2563EB" opacity="0.5"/>
      <rect x="24" y="8" width="20" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="24" y="14" width="14" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <circle cx="44" cy="28" r="3" fill="#0EA5E9" opacity="0.6"/>
    </g>
    <g transform="translate(5, 78)">
      <rect width="50" height="36" rx="5" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5"/>
      <circle cx="14" cy="13" r="6" fill="#0EA5E9" opacity="0.3"/>
      <circle cx="14" cy="11" r="3" fill="#2563EB" opacity="0.5"/>
      <rect x="24" y="8" width="18" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="24" y="14" width="12" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <circle cx="44" cy="28" r="3" fill="#0EA5E9" opacity="0.6"/>
    </g>
    <g transform="translate(5, 121)">
      <rect width="50" height="36" rx="5" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="1.5"/>
      <circle cx="14" cy="13" r="6" fill="#0EA5E9" opacity="0.3"/>
      <circle cx="14" cy="11" r="3" fill="#0EA5E9" opacity="0.5"/>
      <rect x="24" y="8" width="22" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="24" y="14" width="16" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <circle cx="44" cy="28" r="3" fill="#2563EB" opacity="0.6"/>
    </g>
  </g>

  <!-- Column 2: Qualified -->
  <g transform="translate(250, 55)">
    <rect width="60" height="200" rx="8" fill="#0EA5E9" opacity="0.08"/>
    <rect x="2" y="2" width="56" height="24" rx="6" fill="#0EA5E9" opacity="0.15"/>
    <circle cx="14" cy="14" r="4" fill="#0EA5E9" opacity="0.5"/>
    <rect x="22" y="10" width="30" height="3" rx="1.5" fill="#0EA5E9" opacity="0.3"/>
    <!-- Lead cards -->
    <g transform="translate(5, 35)">
      <rect width="50" height="36" rx="5" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="1.5"/>
      <circle cx="14" cy="13" r="6" fill="#10B981" opacity="0.2"/>
      <circle cx="14" cy="11" r="3" fill="#10B981" opacity="0.5"/>
      <rect x="24" y="8" width="20" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="24" y="14" width="14" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <circle cx="44" cy="28" r="3" fill="#10B981" opacity="0.6"/>
    </g>
    <g transform="translate(5, 78)">
      <rect width="50" height="36" rx="5" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="1.5"/>
      <circle cx="14" cy="13" r="6" fill="#10B981" opacity="0.2"/>
      <circle cx="14" cy="11" r="3" fill="#10B981" opacity="0.5"/>
      <rect x="24" y="8" width="16" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="24" y="14" width="10" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <circle cx="44" cy="28" r="3" fill="#10B981" opacity="0.6"/>
    </g>
  </g>

  <!-- Column 3: Closed -->
  <g transform="translate(320, 55)">
    <rect width="60" height="200" rx="8" fill="#10B981" opacity="0.08"/>
    <rect x="2" y="2" width="56" height="24" rx="6" fill="#10B981" opacity="0.15"/>
    <circle cx="14" cy="14" r="4" fill="#10B981" opacity="0.5"/>
    <rect x="22" y="10" width="30" height="3" rx="1.5" fill="#10B981" opacity="0.3"/>
    <!-- Lead card -->
    <g transform="translate(5, 35)">
      <rect width="50" height="36" rx="5" fill="url(#cardGrad)" stroke="#10B981" stroke-width="1.5"/>
      <circle cx="14" cy="13" r="6" fill="#10B981" opacity="0.3"/>
      <circle cx="14" cy="11" r="3" fill="#10B981" opacity="0.7"/>
      <rect x="24" y="8" width="20" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="24" y="14" width="14" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <!-- Checkmark -->
      <path d="M40,26 L43,30 L49,22" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Flow arrows between columns -->
  <g opacity="0.4">
    <path d="M245,110 L250,110" stroke="#0EA5E9" stroke-width="2"/>
    <polygon points="248,107 254,110 248,113" fill="#0EA5E9"/>
    <path d="M315,90 L320,90" stroke="#10B981" stroke-width="2"/>
    <polygon points="318,87 324,90 318,93" fill="#10B981"/>
  </g>

  <!-- Person silhouettes moving through -->
  <g opacity="0.15">
    <circle cx="165" cy="240" r="5" fill="#1E293B"/>
    <ellipse cx="165" cy="252" rx="7" ry="5" fill="#1E293B"/>
  </g>
  <g opacity="0.2">
    <circle cx="235" cy="240" r="5" fill="#2563EB"/>
    <ellipse cx="235" cy="252" rx="7" ry="5" fill="#2563EB"/>
  </g>
  <g opacity="0.25">
    <circle cx="305" cy="240" r="5" fill="#0EA5E9"/>
    <ellipse cx="305" cy="252" rx="7" ry="5" fill="#0EA5E9"/>
  </g>
  <g opacity="0.3">
    <circle cx="360" cy="240" r="5" fill="#10B981"/>
    <ellipse cx="360" cy="252" rx="7" ry="5" fill="#10B981"/>
  </g>

  <!-- Moving arrows under people -->
  <path d="M175,246 L225,246" stroke="#2563EB" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,3"/>
  <polygon points="223,243 229,246 223,249" fill="#2563EB" opacity="0.2"/>
  <path d="M245,246 L295,246" stroke="#0EA5E9" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,3"/>
  <polygon points="293,243 299,246 293,249" fill="#0EA5E9" opacity="0.2"/>
  <path d="M315,246 L350,246" stroke="#10B981" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,3"/>
  <polygon points="348,243 354,246 348,249" fill="#10B981" opacity="0.2"/>

  <!-- Decorative circles -->
  <circle cx="20" cy="25" r="15" fill="#2563EB" opacity="0.06"/>
  <circle cx="385" cy="280" r="20" fill="#0EA5E9" opacity="0.06"/>
  <circle cx="370" cy="30" r="10" fill="#10B981" opacity="0.08"/>
</svg>