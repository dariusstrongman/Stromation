<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.06">
    <circle cx="20" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="50" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="80" cy="20" r="1.5" fill="#1E293B"/>
    <circle cx="320" cy="280" r="1.5" fill="#1E293B"/>
    <circle cx="350" cy="280" r="1.5" fill="#1E293B"/>
    <circle cx="380" cy="280" r="1.5" fill="#1E293B"/>
  </g>

  <!-- === Central gear/hub === -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="150" r="38" fill="white" stroke="url(#nodeGrad1)" stroke-width="3"/>
    <circle cx="200" cy="150" r="28" fill="url(#nodeGrad1)" opacity="0.1"/>
    <!-- Gear teeth -->
    <g stroke="url(#nodeGrad1)" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="200" y1="108" x2="200" y2="115"/>
      <line x1="200" y1="185" x2="200" y2="192"/>
      <line x1="158" y1="150" x2="165" y2="150"/>
      <line x1="235" y1="150" x2="242" y2="150"/>
      <line x1="172" y1="120" x2="177" y2="125"/>
      <line x1="223" y1="175" x2="228" y2="180"/>
      <line x1="228" y1="120" x2="223" y2="125"/>
      <line x1="177" y1="175" x2="172" y2="180"/>
    </g>
    <!-- Inner icon: code brackets -->
    <text x="200" y="157" text-anchor="middle" font-family="monospace" font-size="24" font-weight="700" fill="#2563EB" opacity="0.7">{...}</text>
  </g>

  <!-- === Surrounding nodes (connected tools) === -->

  <!-- Node 1: Top left - Form -->
  <g filter="url(#shadowSm)">
    <rect x="40" y="40" width="70" height="52" rx="10" fill="white" stroke="#2563EB" stroke-width="2"/>
    <rect x="52" y="54" width="32" height="3" rx="1.5" fill="#2563EB" opacity="0.3"/>
    <rect x="52" y="62" width="46" height="8" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="52" y="76" width="46" height="8" rx="3" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  </g>

  <!-- Node 2: Top right - Database -->
  <g filter="url(#shadowSm)">
    <rect x="290" y="40" width="70" height="52" rx="10" fill="white" stroke="#0EA5E9" stroke-width="2"/>
    <ellipse cx="325" cy="56" rx="20" ry="7" fill="none" stroke="#0EA5E9" stroke-width="2"/>
    <line x1="305" y1="56" x2="305" y2="76" stroke="#0EA5E9" stroke-width="2"/>
    <line x1="345" y1="56" x2="345" y2="76" stroke="#0EA5E9" stroke-width="2"/>
    <ellipse cx="325" cy="76" rx="20" ry="7" fill="none" stroke="#0EA5E9" stroke-width="2"/>
  </g>

  <!-- Node 3: Bottom left - Email -->
  <g filter="url(#shadowSm)">
    <rect x="40" y="208" width="70" height="52" rx="10" fill="white" stroke="#10B981" stroke-width="2"/>
    <rect x="52" y="222" width="46" height="28" rx="4" fill="none" stroke="#10B981" stroke-width="2"/>
    <polyline points="52,222 75,238 98,222" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Node 4: Bottom right - Chart -->
  <g filter="url(#shadowSm)">
    <rect x="290" y="208" width="70" height="52" rx="10" fill="white" stroke="#2563EB" stroke-width="2"/>
    <rect x="305" y="238" width="10" height="16" rx="2" fill="#2563EB" opacity="0.5"/>
    <rect x="320" y="228" width="10" height="26" rx="2" fill="#2563EB" opacity="0.7"/>
    <rect x="335" y="233" width="10" height="21" rx="2" fill="#0EA5E9"/>
  </g>

  <!-- Node 5: Left middle - AI brain -->
  <g filter="url(#shadowSm)">
    <circle cx="55" cy="150" r="24" fill="white" stroke="#2563EB" stroke-width="2"/>
    <text x="55" y="156" text-anchor="middle" font-size="18" fill="#2563EB" opacity="0.8">AI</text>
  </g>

  <!-- Node 6: Right middle - API -->
  <g filter="url(#shadowSm)">
    <circle cx="345" cy="150" r="24" fill="white" stroke="#0EA5E9" stroke-width="2"/>
    <text x="345" y="155" text-anchor="middle" font-family="monospace" font-size="13" font-weight="700" fill="#0EA5E9" opacity="0.8">API</text>
  </g>

  <!-- === Connecting lines (animated) === -->
  <!-- Top left to center -->
  <path d="M110,66 C140,66 160,120 165,140" stroke="url(#lineGrad)" stroke-width="2" fill="none" stroke-dasharray="5,4" opacity="0.5"/>
  <circle r="3" fill="#2563EB" opacity="0.7">
    <animateMotion dur="2s" repeatCount="indefinite" path="M110,66 C140,66 160,120 165,140"/>
  </circle>

  <!-- Top right to center -->
  <path d="M290,66 C260,66 240,120 235,140" stroke="url(#lineGrad)" stroke-width="2" fill="none" stroke-dasharray="5,4" opacity="0.5"/>
  <circle r="3" fill="#0EA5E9" opacity="0.7">
    <animateMotion dur="2.3s" repeatCount="indefinite" path="M290,66 C260,66 240,120 235,140"/>
  </circle>

  <!-- Bottom left to center -->
  <path d="M110,234 C140,234 160,180 165,160" stroke="#10B981" stroke-width="2" fill="none" stroke-dasharray="5,4" opacity="0.5"/>
  <circle r="3" fill="#10B981" opacity="0.7">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M110,234 C140,234 160,180 165,160"/>
  </circle>

  <!-- Bottom right to center -->
  <path d="M290,234 C260,234 240,180 235,160" stroke="url(#lineGrad)" stroke-width="2" fill="none" stroke-dasharray="5,4" opacity="0.5"/>
  <circle r="3" fill="#2563EB" opacity="0.7">
    <animateMotion dur="2.1s" repeatCount="indefinite" path="M290,234 C260,234 240,180 235,160"/>
  </circle>

  <!-- Left middle to center -->
  <line x1="79" y1="150" x2="162" y2="150" stroke="#2563EB" stroke-width="2" stroke-dasharray="5,4" opacity="0.4"/>
  <circle r="3" fill="#2563EB" opacity="0.7">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M79,150 L162,150"/>
  </circle>

  <!-- Right middle to center -->
  <line x1="321" y1="150" x2="238" y2="150" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5,4" opacity="0.4"/>
  <circle r="3" fill="#0EA5E9" opacity="0.7">
    <animateMotion dur="1.9s" repeatCount="indefinite" path="M321,150 L238,150"/>
  </circle>

  <!-- Decorative accent circles -->
  <circle cx="380" cy="25" r="14" fill="#2563EB" opacity="0.06"/>
  <circle cx="20" cy="280" r="10" fill="#0EA5E9" opacity="0.06"/>
</svg>
