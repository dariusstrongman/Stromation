<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="auditGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Clipboard body -->
  <rect x="18" y="14" width="32" height="42" rx="4" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
  <!-- Clipboard clip -->
  <rect x="28" y="10" width="12" height="8" rx="2" fill="url(#auditGrad)"/>
  <!-- Checklist lines -->
  <!-- Row 1 -->
  <rect x="24" y="26" width="5" height="5" rx="1" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <polyline points="25,28.8 26.5,30.5 29,26.5" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="33" y1="28.5" x2="44" y2="28.5" stroke="#1E293B" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
  <!-- Row 2 -->
  <rect x="24" y="35" width="5" height="5" rx="1" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <polyline points="25,37.8 26.5,39.5 29,35.5" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="33" y1="37.5" x2="44" y2="37.5" stroke="#1E293B" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
  <!-- Row 3 -->
  <rect x="24" y="44" width="5" height="5" rx="1" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="33" y1="46.5" x2="41" y2="46.5" stroke="#1E293B" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>

  <!-- Magnifying glass overlaid (bottom-right) -->
  <circle cx="54" cy="54" r="12" fill="#F8FAFC" stroke="url(#auditGrad)" stroke-width="2.5"/>
  <circle cx="54" cy="54" r="7" fill="#2563EB" opacity="0.08"/>
  <line x1="62.5" y1="62.5" x2="70" y2="70" stroke="url(#auditGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Magnifying glass glare -->
  <path d="M49,49 Q51,47 53,49" fill="none" stroke="white" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
</svg>