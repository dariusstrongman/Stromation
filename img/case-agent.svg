<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Kanban board background -->
  <rect x="15" y="20" width="370" height="260" rx="10" fill="#FFFFFF" opacity="0.4" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Column 1: New Leads -->
  <g transform="translate(22, 28)">
    <!-- Column background -->
    <rect width="82" height="244" rx="8" fill="#2563EB" opacity="0.04"/>
    <!-- Column header -->
    <rect x="2" y="2" width="78" height="26" rx="6" fill="#2563EB" opacity="0.1"/>
    <circle cx="15" cy="15" r="5" fill="#2563EB" opacity="0.25"/>
    <rect x="24" y="11" width="40" height="4" rx="2" fill="#2563EB" opacity="0.2"/>
    <rect x="24" y="18" width="20" height="2" rx="1" fill="#2563EB" opacity="0.1"/>
    <!-- Count badge -->
    <circle cx="72" cy="15" r="7" fill="#2563EB" opacity="0.15"/>

    <!-- Card 1 -->
    <g transform="translate(5, 36)">
      <rect width="72" height="52" rx="6" fill="url(#cardShadow)" stroke="#2563EB" stroke-width="1.5"/>
      <!-- Person icon -->
      <circle cx="16" cy="14" r="7" fill="#2563EB" opacity="0.1"/>
      <circle cx="16" cy="12" r="3.5" fill="#2563EB" opacity="0.3"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#2563EB" opacity="0.15"/>
      <!-- Info -->
      <rect x="28" y="9" width="36" height="3" rx="1.5" fill="#1E293B" opacity="0.18"/>
      <rect x="28" y="15" width="24" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <!-- Tags -->
      <rect x="8" y="28" width="22" height="8" rx="4" fill="#2563EB" opacity="0.1"/>
      <rect x="34" y="28" width="18" height="8" rx="4" fill="#0EA5E9" opacity="0.1"/>
      <!-- Status dot -->
      <circle cx="62" cy="44" r="3" fill="#2563EB" opacity="0.5"/>
    </g>

    <!-- Card 2 -->
    <g transform="translate(5, 96)">
      <rect width="72" height="52" rx="6" fill="url(#cardShadow)" stroke="#2563EB" stroke-width="1.5"/>
      <circle cx="16" cy="14" r="7" fill="#0EA5E9" opacity="0.1"/>
      <circle cx="16" cy="12" r="3.5" fill="#0EA5E9" opacity="0.3"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#0EA5E9" opacity="0.15"/>
      <rect x="28" y="9" width="30" height="3" rx="1.5" fill="#1E293B" opacity="0.18"/>
      <rect x="28" y="15" width="20" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <rect x="8" y="28" width="26" height="8" rx="4" fill="#2563EB" opacity="0.1"/>
      <rect x="38" y="28" width="16" height="8" rx="4" fill="#10B981" opacity="0.1"/>
      <circle cx="62" cy="44" r="3" fill="#0EA5E9" opacity="0.5"/>
    </g>

    <!-- Card 3 -->
    <g transform="translate(5, 156)">
      <rect width="72" height="52" rx="6" fill="url(#cardShadow)" stroke="#0EA5E9" stroke-width="1.5"/>
      <circle cx="16" cy="14" r="7" fill="#2563EB" opacity="0.08"/>
      <circle cx="16" cy="12" r="3.5" fill="#2563EB" opacity="0.25"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#2563EB" opacity="0.12"/>
      <rect x="28" y="9" width="34" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
      <rect x="28" y="15" width="22" height="2" rx="1" fill="#1E293B" opacity="0.08"/>
      <rect x="8" y="28" width="20" height="8" rx="4" fill="#0EA5E9" opacity="0.1"/>
      <circle cx="62" cy="44" r="3" fill="#2563EB" opacity="0.4"/>
    </g>
  </g>

  <!-- Column 2: Contacted -->
  <g transform="translate(112, 28)">
    <rect width="82" height="244" rx="8" fill="#0EA5E9" opacity="0.04"/>
    <rect x="2" y="2" width="78" height="26" rx="6" fill="#0EA5E9" opacity="0.1"/>
    <circle cx="15" cy="15" r="5" fill="#0EA5E9" opacity="0.25"/>
    <rect x="24" y="11" width="35" height="4" rx="2" fill="#0EA5E9" opacity="0.2"/>
    <rect x="24" y="18" width="22" height="2" rx="1" fill="#0EA5E9" opacity="0.1"/>
    <circle cx="72" cy="15" r="7" fill="#0EA5E9" opacity="0.15"/>

    <!-- Card 1 -->
    <g transform="translate(5, 36)">
      <rect width="72" height="52" rx="6" fill="url(#cardShadow)" stroke="#0EA5E9" stroke-width="1.5"/>
      <circle cx="16" cy="14" r="7" fill="#0EA5E9" opacity="0.12"/>
      <circle cx="16" cy="12" r="3.5" fill="#0EA5E9" opacity="0.35"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#0EA5E9" opacity="0.18"/>
      <rect x="28" y="9" width="32" height="3" rx="1.5" fill="#1E293B" opacity="0.18"/>
      <rect x="28" y="15" width="26" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
      <rect x="8" y="28" width="24" height="8" rx="4" fill="#0EA5E9" opacity="0.12"/>
      <rect x="36" y="28" width="20" height="8" rx="4" fill="#2563EB" opacity="0.08"/>
      <circle cx="62" cy="44" r="3" fill="#0EA5E9" opacity="0.6"/>
      <!-- Email icon -->
      <rect x="8" y="40" width="10" height="7" rx="1.5" fill="#0EA5E9" opacity="0.15" stroke="#0EA5E9" stroke-width="0.5"/>
      <path d="M8,40 L13,44 L18,40" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.3"/>
    </g>

    <!-- Card 2 -->
    <g transform="translate(5, 96)">
      <rect width="72" height="52" rx="6" fill="url(#cardShadow)" stroke="#0EA5E9" stroke-width="1.5"/>
      <circle cx="16" cy="14" r="7" fill="#2563EB" opacity="0.1"/>
      <circle cx="16" cy="12" r="3.5" fill="#2563EB" opacity="0.3"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#2563EB" opacity="0.13"/>
      <rect x="28" y="9" width="28" height="3" rx="1.5" fill="#1E293B" opacity="0.16"/>
      <rect x="28" y="15" width="18" height="2" rx="1" fill="#1E293B" opacity="0.09"/>
      <rect x="8" y="28" width="28" height="8" rx="4" fill="#0EA5E9" opacity="0.1"/>
      <circle cx="62" cy="44" r="3" fill="#0EA5E9" opacity="0.5"/>
      <rect x="8" y="40" width="10" height="7" rx="1.5" fill="#0EA5E9" opacity="0.12" stroke="#0EA5E9" stroke-width="0.5"/>
      <path d="M8,40 L13,44 L18,40" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.25"/>
    </g>
  </g>

  <!-- Column 3: Qualified -->
  <g transform="translate(202, 28)">
    <rect width="82" height="244" rx="8" fill="#2563EB" opacity="0.04"/>
    <rect x="2" y="2" width="78" height="26" rx="6" fill="#2563EB" opacity="0.08"/>
    <circle cx="15" cy="15" r="5" fill="#2563EB" opacity="0.2"/>
    <rect x="24" y="11" width="38" height="4" rx="2" fill="#2563EB" opacity="0.18"/>
    <rect x="24" y="18" width="24" height="2" rx="1" fill="#2563EB" opacity="0.08"/>
    <circle cx="72" cy="15" r="7" fill="#2563EB" opacity="0.12"/>

    <!-- Card 1 -->
    <g transform="translate(5, 36)">
      <rect width="72" height="60" rx="6" fill="url(#cardShadow)" stroke="#2563EB" stroke-width="1.5"/>
      <circle cx="16" cy="14" r="7" fill="#10B981" opacity="0.12"/>
      <circle cx="16" cy="12" r="3.5" fill="#10B981" opacity="0.35"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#10B981" opacity="0.18"/>
      <rect x="28" y="9" width="36" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="28" y="15" width="24" height="2" rx="1" fill="#1E293B" opacity="0.12"/>
      <!-- Score bar -->
      <rect x="8" y="28" width="56" height="5" rx="2.5" fill="#E2E8F0"/>
      <rect x="8" y="28" width="42" height="5" rx="2.5" fill="url(#blueGrad)" opacity="0.5"/>
      <!-- Tags -->
      <rect x="8" y="38" width="26" height="8" rx="4" fill="#10B981" opacity="0.12"/>
      <rect x="38" y="38" width="22" height="8" rx="4" fill="#2563EB" opacity="0.1"/>
      <circle cx="62" cy="52" r="3" fill="#10B981" opacity="0.6"/>
    </g>

    <!-- Card 2 (partially visible, being moved) -->
    <g transform="translate(5, 104)" opacity="0.7">
      <rect width="72" height="52" rx="6" fill="url(#cardShadow)" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,2"/>
      <circle cx="16" cy="14" r="7" fill="#0EA5E9" opacity="0.1"/>
      <circle cx="16" cy="12" r="3.5" fill="#0EA5E9" opacity="0.25"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#0EA5E9" opacity="0.12"/>
      <rect x="28" y="9" width="30" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <rect x="28" y="15" width="20" height="2" rx="1" fill="#1E293B" opacity="0.07"/>
      <rect x="8" y="28" width="56" height="5" rx="2.5" fill="#E2E8F0"/>
      <rect x="8" y="28" width="35" height="5" rx="2.5" fill="#0EA5E9" opacity="0.4"/>
    </g>
  </g>

  <!-- Column 4: Closed/Won -->
  <g transform="translate(292, 28)">
    <rect width="82" height="244" rx="8" fill="#10B981" opacity="0.04"/>
    <rect x="2" y="2" width="78" height="26" rx="6" fill="#10B981" opacity="0.1"/>
    <circle cx="15" cy="15" r="5" fill="#10B981" opacity="0.25"/>
    <rect x="24" y="11" width="30" height="4" rx="2" fill="#10B981" opacity="0.2"/>
    <rect x="24" y="18" width="18" height="2" rx="1" fill="#10B981" opacity="0.1"/>
    <circle cx="72" cy="15" r="7" fill="#10B981" opacity="0.15"/>

    <!-- Card 1 (won) -->
    <g transform="translate(5, 36)">
      <rect width="72" height="56" rx="6" fill="url(#cardShadow)" stroke="#10B981" stroke-width="1.5"/>
      <circle cx="16" cy="14" r="7" fill="#10B981" opacity="0.15"/>
      <circle cx="16" cy="12" r="3.5" fill="#10B981" opacity="0.4"/>
      <path d="M10,19 C10,16 22,16 22,19" fill="#10B981" opacity="0.2"/>
      <rect x="28" y="9" width="34" height="3" rx="1.5" fill="#1E293B" opacity="0.2"/>
      <rect x="28" y="15" width="22" height="2" rx="1" fill="#1E293B" opacity="0.12"/>
      <!-- Score bar full -->
      <rect x="8" y="28" width="56" height="5" rx="2.5" fill="#E2E8F0"/>
      <rect x="8" y="28" width="56" height="5" rx="2.5" fill="#10B981" opacity="0.5"/>
      <!-- Won badge -->
      <rect x="8" y="38" width="30" height="10" rx="5" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="1"/>
      <path d="M14,43 L17,46 L24,39" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Movement arrows between columns -->
  <g opacity="0.25">
    <!-- New → Contacted -->
    <path d="M100,95 C106,95 106,95 112,95" stroke="#0EA5E9" stroke-width="1.5"/>
    <polygon points="110,92 116,95 110,98" fill="#0EA5E9"/>

    <!-- Contacted → Qualified -->
    <path d="M190,85 C196,85 196,85 202,85" stroke="#2563EB" stroke-width="1.5"/>
    <polygon points="200,82 206,85 200,88" fill="#2563EB"/>

    <!-- Qualified → Closed -->
    <path d="M280,80 C286,80 286,80 292,80" stroke="#10B981" stroke-width="1.5"/>
    <polygon points="290,77 296,80 290,83" fill="#10B981"/>
  </g>

  <!-- Floating card being dragged (visual flair) -->
  <g transform="translate(248, 120)" opacity="0.45">
    <rect x="-2" y="-2" width="44" height="34" rx="5" fill="#1E293B" opacity="0.08"/>
    <rect width="40" height="30" rx="5" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.5"/>
    <circle cx="12" cy="10" r="4" fill="#0EA5E9" opacity="0.2"/>
    <circle cx="12" cy="9" r="2" fill="#0EA5E9" opacity="0.3"/>
    <rect x="20" y="7" width="14" height="2.5" rx="1.25" fill="#1E293B" opacity="0.15"/>
    <rect x="6" y="20" width="28" height="3" rx="1.5" fill="#E2E8F0"/>
    <rect x="6" y="20" width="18" height="3" rx="1.5" fill="#0EA5E9" opacity="0.3"/>
    <!-- Drag cursor -->
    <path d="M38,0 L42,-4 L42,0 L46,0 L42,4 L42,0" fill="#0EA5E9" opacity="0.5"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="10" cy="10" r="6" fill="#2563EB" opacity="0.04"/>
  <circle cx="395" cy="295" r="8" fill="#10B981" opacity="0.04"/>
</svg>