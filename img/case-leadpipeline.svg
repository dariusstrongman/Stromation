<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#1E293B" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="300" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Step 1: Web form (top left) -->
  <g transform="translate(20, 35)">
    <rect width="70" height="55" rx="8" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="2"/>
    <rect x="10" y="10" width="50" height="6" rx="3" fill="#2563EB" opacity="0.15"/>
    <rect x="10" y="22" width="50" height="6" rx="3" fill="#2563EB" opacity="0.1"/>
    <rect x="15" y="35" width="40" height="12" rx="4" fill="url(#blueGrad)"/>
    <text x="35" y="44" font-family="Inter, sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="600">SEND</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M95,62 L125,62" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="123,58 133,62 123,66" fill="#0EA5E9" opacity="0.7"/>

  <!-- Step 2: CRM entry -->
  <g transform="translate(138, 35)">
    <rect width="70" height="55" rx="8" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="2"/>
    <!-- Database rows -->
    <rect x="8" y="10" width="54" height="8" rx="2" fill="#0EA5E9" opacity="0.15"/>
    <rect x="8" y="22" width="54" height="8" rx="2" fill="#0EA5E9" opacity="0.1"/>
    <rect x="8" y="34" width="54" height="8" rx="2" fill="#0EA5E9" opacity="0.08"/>
    <circle cx="58" cy="14" r="3" fill="#10B981" opacity="0.5"/>
    <text x="35" y="52" font-family="Inter, sans-serif" font-size="5.5" fill="#64748B" text-anchor="middle">CRM Entry</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M213,62 L243,62" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="241,58 251,62 241,66" fill="#0EA5E9" opacity="0.7"/>

  <!-- Step 3: Instant response (SMS + Email) -->
  <g transform="translate(255, 25)">
    <rect width="70" height="75" rx="8" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="2"/>
    <!-- SMS icon -->
    <rect x="10" y="10" width="22" height="28" rx="4" fill="none" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="13" y="14" width="16" height="16" rx="2" fill="#2563EB" opacity="0.08"/>
    <circle cx="21" cy="34" r="2" fill="#2563EB" opacity="0.3"/>
    <!-- Email icon -->
    <rect x="38" y="14" width="24" height="16" rx="3" fill="none" stroke="#0EA5E9" stroke-width="1.5"/>
    <polyline points="38,14 50,24 62,14" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Lightning bolt for "instant" -->
    <path d="M32,48 L37,48 L34,55 L40,55 L33,66 L35,58 L30,58 Z" fill="#F59E0B" opacity="0.7"/>
    <text x="35" y="76" font-family="Inter, sans-serif" font-size="5.5" fill="#64748B" text-anchor="middle">&lt; 2 min</text>
  </g>

  <!-- Arrow 3 (down) -->
  <path d="M290,105 C290,125 290,130 290,140" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="286,138 290,148 294,138" fill="#0EA5E9" opacity="0.7"/>

  <!-- Step 4: Follow-up sequence (7 days) -->
  <g transform="translate(220, 150)">
    <rect width="140" height="55" rx="8" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="2"/>
    <!-- Timeline dots -->
    <circle cx="20" cy="22" r="5" fill="#2563EB" opacity="0.8"/>
    <circle cx="40" cy="22" r="5" fill="#2563EB" opacity="0.6"/>
    <circle cx="60" cy="22" r="5" fill="#2563EB" opacity="0.45"/>
    <circle cx="80" cy="22" r="5" fill="#2563EB" opacity="0.3"/>
    <circle cx="100" cy="22" r="5" fill="#2563EB" opacity="0.2"/>
    <circle cx="120" cy="22" r="5" fill="#10B981" opacity="0.6"/>
    <!-- Connecting line -->
    <line x1="25" y1="22" x2="115" y2="22" stroke="#2563EB" stroke-width="1.5" opacity="0.2"/>
    <text x="70" y="42" font-family="Inter, sans-serif" font-size="7" fill="#64748B" text-anchor="middle" font-weight="500">7-Day Follow-Up Sequence</text>
  </g>

  <!-- Arrow 4 (down) -->
  <path d="M290,210 C290,225 290,230 290,240" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="286,238 290,248 294,238" fill="#10B981" opacity="0.7"/>

  <!-- Step 5: Meeting booked -->
  <g transform="translate(245, 248)">
    <rect width="90" height="35" rx="8" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="2"/>
    <!-- Calendar check -->
    <rect x="10" y="6" width="22" height="22" rx="3" fill="none" stroke="#10B981" stroke-width="1.5"/>
    <line x1="10" y1="13" x2="32" y2="13" stroke="#10B981" stroke-width="1.5"/>
    <path d="M16,20 L20,24 L28,16" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="60" y="22" font-family="Inter, sans-serif" font-size="7" fill="#059669" text-anchor="middle" font-weight="600">Booked</text>
  </g>

  <!-- Side: AI qualification badge -->
  <g transform="translate(30, 140)">
    <rect width="100" height="70" rx="8" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Brain/AI icon -->
    <circle cx="50" cy="28" r="14" fill="#2563EB" opacity="0.08" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="44" cy="25" r="3" fill="#2563EB" opacity="0.3"/>
    <circle cx="56" cy="25" r="3" fill="#0EA5E9" opacity="0.3"/>
    <circle cx="50" cy="33" r="2.5" fill="#2563EB" opacity="0.2"/>
    <line x1="44" y1="25" x2="56" y2="25" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
    <line x1="44" y1="25" x2="50" y2="33" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
    <line x1="56" y1="25" x2="50" y2="33" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
    <text x="50" y="55" font-family="Inter, sans-serif" font-size="7" fill="#2563EB" text-anchor="middle" font-weight="600">AI Scoring</text>
    <text x="50" y="64" font-family="Inter, sans-serif" font-size="6" fill="#64748B" text-anchor="middle">OpenAI</text>
  </g>

  <!-- Arrow from AI to sequence -->
  <path d="M135,175 C165,175 190,175 220,175" fill="none" stroke="#2563EB" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <polygon points="218,171 228,175 218,179" fill="#2563EB" opacity="0.5"/>

  <!-- Decorative circles -->
  <circle cx="20" cy="15" r="12" fill="#2563EB" opacity="0.06"/>
  <circle cx="385" cy="280" r="18" fill="#0EA5E9" opacity="0.06"/>
  <circle cx="380" cy="20" r="10" fill="#10B981" opacity="0.08"/>

  <!-- Status text -->
  <text x="200" y="292" font-family="Inter, sans-serif" font-size="10" fill="#64748B" text-anchor="middle" font-weight="500">Lead Capture → AI Score → Auto Follow-Up → Booking</text>
</svg>