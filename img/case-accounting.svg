<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.03">
    <line x1="0" y1="300" x2="300" y2="0" stroke="#1E293B" stroke-width="1"/>
    <line x1="50" y1="300" x2="350" y2="0" stroke="#1E293B" stroke-width="1"/>
    <line x1="100" y1="300" x2="400" y2="0" stroke="#1E293B" stroke-width="1"/>
    <line x1="150" y1="300" x2="400" y2="50" stroke="#1E293B" stroke-width="1"/>
    <line x1="200" y1="300" x2="400" y2="100" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Invoice document (left) -->
  <g transform="translate(25, 45)">
    <!-- Document shadow -->
    <rect x="4" y="4" width="100" height="130" rx="8" fill="#1E293B" opacity="0.05"/>
    <!-- Document -->
    <rect width="100" height="130" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <!-- Corner fold -->
    <path d="M72,0 L100,0 L100,28 Z" fill="#F1F5F9"/>
    <path d="M72,0 L72,28 L100,28" fill="none" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Invoice header -->
    <rect x="10" y="10" width="50" height="5" rx="2.5" fill="#2563EB" opacity="0.25"/>
    <rect x="10" y="20" width="35" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
    <!-- Divider -->
    <line x1="10" y1="30" x2="90" y2="30" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Line items -->
    <g transform="translate(10, 36)">
      <rect width="75" height="12" rx="3" fill="#2563EB" opacity="0.04"/>
      <rect x="4" y="3" width="30" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
      <rect x="4" y="7" width="20" height="2" rx="1" fill="#1E293B" opacity="0.08"/>
      <rect x="55" y="4" width="16" height="3" rx="1.5" fill="#2563EB" opacity="0.2"/>
    </g>
    <g transform="translate(10, 52)">
      <rect width="75" height="12" rx="3" fill="#0EA5E9" opacity="0.04"/>
      <rect x="4" y="3" width="25" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
      <rect x="4" y="7" width="18" height="2" rx="1" fill="#1E293B" opacity="0.08"/>
      <rect x="55" y="4" width="14" height="3" rx="1.5" fill="#0EA5E9" opacity="0.2"/>
    </g>
    <g transform="translate(10, 68)">
      <rect width="75" height="12" rx="3" fill="#2563EB" opacity="0.04"/>
      <rect x="4" y="3" width="35" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <rect x="4" y="7" width="22" height="2" rx="1" fill="#1E293B" opacity="0.07"/>
      <rect x="55" y="4" width="18" height="3" rx="1.5" fill="#2563EB" opacity="0.18"/>
    </g>
    <g transform="translate(10, 84)">
      <rect width="75" height="12" rx="3" fill="#0EA5E9" opacity="0.03"/>
      <rect x="4" y="3" width="28" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <rect x="4" y="7" width="16" height="2" rx="1" fill="#1E293B" opacity="0.06"/>
      <rect x="55" y="4" width="12" height="3" rx="1.5" fill="#0EA5E9" opacity="0.15"/>
    </g>
    <!-- Total line -->
    <line x1="10" y1="102" x2="90" y2="102" stroke="#2563EB" stroke-width="1" opacity="0.3"/>
    <rect x="10" y="106" width="30" height="4" rx="2" fill="#2563EB" opacity="0.2"/>
    <rect x="55" y="106" width="30" height="5" rx="2.5" fill="#2563EB" opacity="0.3"/>
    <!-- Dollar sign -->
    <circle cx="85" cy="120" r="6" fill="#10B981" opacity="0.15"/>
    <path d="M83,118 L83,122 M85,116 C88,116 88,119 85,119 C82,119 82,122 85,122 M85,116 L85,114 M85,122 L85,124" fill="none" stroke="#10B981" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Second invoice (stacked behind) -->
  <g transform="translate(35, 55)" opacity="0.4">
    <rect width="100" height="130" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="10" y="10" width="50" height="5" rx="2.5" fill="#2563EB" opacity="0.15"/>
  </g>

  <!-- Arrow: Invoice → Processing -->
  <g>
    <path d="M132,115 C152,115 152,140 168,140" fill="none" stroke="#0EA5E9" stroke-width="2" opacity="0.5"/>
    <polygon points="166,136 174,140 166,144" fill="#0EA5E9" opacity="0.5"/>
    <!-- Small document icon traveling along arrow -->
    <rect x="145" y="121" width="10" height="12" rx="2" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1" opacity="0.7"/>
    <rect x="148" y="125" width="4" height="1" rx="0.5" fill="#0EA5E9" opacity="0.5"/>
    <rect x="148" y="128" width="3" height="1" rx="0.5" fill="#0EA5E9" opacity="0.4"/>
  </g>

  <!-- Processing step (center gear/cog) -->
  <g transform="translate(175, 95)">
    <!-- Processing box -->
    <rect width="70" height="90" rx="10" fill="#FFFFFF" stroke="url(#blueGrad)" stroke-width="2"/>
    <!-- Inner glow -->
    <rect x="5" y="5" width="60" height="80" rx="7" fill="#2563EB" opacity="0.03"/>

    <!-- Gear icon -->
    <g transform="translate(35, 35)">
      <!-- Gear outer -->
      <circle cx="0" cy="0" r="16" fill="#2563EB" opacity="0.08"/>
      <path d="M-3,-18 L3,-18 L4,-14 C5,-14 6,-13 7,-12 L11,-14 L15,-9 L12,-6 C13,-5 13,-4 13,-3 L17,-2 L17,4 L13,5 C13,6 12,7 11,8 L14,11 L10,16 L7,13 C6,14 5,14 4,15 L3,19 L-3,19 L-4,15 C-5,14 -6,14 -7,13 L-11,16 L-15,11 L-12,8 C-13,7 -13,6 -14,5 L-18,4 L-18,-2 L-14,-3 C-14,-4 -13,-5 -12,-6 L-15,-9 L-11,-14 L-7,-12 C-6,-13 -5,-14 -4,-14 Z" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5" opacity="0.9"/>
      <circle cx="0" cy="0" r="6" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="2" fill="#0EA5E9" opacity="0.5"/>
    </g>

    <!-- Processing indicators -->
    <rect x="12" y="65" width="46" height="4" rx="2" fill="#E2E8F0"/>
    <rect x="12" y="65" width="30" height="4" rx="2" fill="url(#blueGrad)" opacity="0.6"/>
    <!-- Sparkle dots -->
    <circle cx="15" y="78" r="2" fill="#0EA5E9" opacity="0.4"/>
    <circle cx="25" y="78" r="2" fill="#2563EB" opacity="0.3"/>
    <circle cx="35" y="78" r="2" fill="#0EA5E9" opacity="0.5"/>

    <!-- Rotating arrows around gear -->
    <path d="M10,8 C4,2 4,-4 10,-8" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
    <path d="M60,8 C66,2 66,-4 60,-8" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Arrow: Processing → Output -->
  <g>
    <path d="M250,140 C265,140 265,130 280,130" fill="none" stroke="#10B981" stroke-width="2" opacity="0.5"/>
    <polygon points="278,126 286,130 278,134" fill="#10B981" opacity="0.5"/>
    <!-- Checkmark traveling -->
    <circle cx="262" cy="134" r="6" fill="#10B981" opacity="0.15"/>
    <path d="M259,134 L261,136 L266,131" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Output spreadsheet/data grid (right) -->
  <g transform="translate(280, 50)">
    <!-- Spreadsheet shadow -->
    <rect x="4" y="4" width="100" height="170" rx="8" fill="#1E293B" opacity="0.04"/>
    <!-- Spreadsheet -->
    <rect width="100" height="170" rx="8" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <!-- Header row -->
    <rect x="1" y="1" width="98" height="22" rx="7" fill="#10B981" opacity="0.12"/>
    <rect x="10" y="7" width="20" height="4" rx="2" fill="#10B981" opacity="0.3"/>
    <rect x="38" y="7" width="18" height="4" rx="2" fill="#10B981" opacity="0.25"/>
    <rect x="64" y="7" width="26" height="4" rx="2" fill="#10B981" opacity="0.3"/>
    <!-- Grid lines -->
    <line x1="33" y1="23" x2="33" y2="170" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="60" y1="23" x2="60" y2="170" stroke="#E2E8F0" stroke-width="0.5"/>

    <!-- Data rows -->
    <g transform="translate(0, 26)">
      <rect x="2" y="0" width="96" height="20" fill="#F8FAFC"/>
      <rect x="8" y="5" width="18" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <rect x="38" y="5" width="14" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <rect x="66" y="5" width="22" height="3" rx="1.5" fill="#10B981" opacity="0.2"/>
      <path d="M92,5 L93,8 L96,3" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <line x1="5" y1="46" x2="95" y2="46" stroke="#E2E8F0" stroke-width="0.5"/>

    <g transform="translate(0, 50)">
      <rect x="8" y="5" width="20" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <rect x="38" y="5" width="16" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <rect x="66" y="5" width="18" height="3" rx="1.5" fill="#10B981" opacity="0.18"/>
      <path d="M92,5 L93,8 L96,3" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <line x1="5" y1="70" x2="95" y2="70" stroke="#E2E8F0" stroke-width="0.5"/>

    <g transform="translate(0, 74)">
      <rect x="2" y="0" width="96" height="20" fill="#F8FAFC"/>
      <rect x="8" y="5" width="16" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <rect x="38" y="5" width="12" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <rect x="66" y="5" width="24" height="3" rx="1.5" fill="#10B981" opacity="0.2"/>
      <path d="M92,5 L93,8 L96,3" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <line x1="5" y1="94" x2="95" y2="94" stroke="#E2E8F0" stroke-width="0.5"/>

    <g transform="translate(0, 98)">
      <rect x="8" y="5" width="22" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <rect x="38" y="5" width="15" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <rect x="66" y="5" width="20" height="3" rx="1.5" fill="#10B981" opacity="0.18"/>
      <path d="M92,5 L93,8 L96,3" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    </g>
    <line x1="5" y1="118" x2="95" y2="118" stroke="#E2E8F0" stroke-width="0.5"/>

    <g transform="translate(0, 122)">
      <rect x="2" y="0" width="96" height="20" fill="#F8FAFC"/>
      <rect x="8" y="5" width="18" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <rect x="38" y="5" width="13" height="3" rx="1.5" fill="#1E293B" opacity="0.08"/>
      <rect x="66" y="5" width="16" height="3" rx="1.5" fill="#10B981" opacity="0.15"/>
      <path d="M92,5 L93,8 L96,3" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </g>
    <line x1="5" y1="142" x2="95" y2="142" stroke="#E2E8F0" stroke-width="0.5"/>

    <!-- Total row -->
    <rect x="2" y="146" width="96" height="22" rx="0 0 7 7" fill="#10B981" opacity="0.06"/>
    <rect x="8" y="152" width="24" height="4" rx="2" fill="#10B981" opacity="0.25"/>
    <rect x="66" y="152" width="24" height="4" rx="2" fill="#10B981" opacity="0.35"/>
  </g>

  <!-- Validation checkmark (large) -->
  <g transform="translate(340, 235)">
    <circle cx="20" cy="20" r="18" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="12" fill="#10B981" opacity="0.08"/>
    <path d="M12,20 L18,26 L28,14" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small floating elements -->
  <circle cx="160" cy="50" r="4" fill="#2563EB" opacity="0.08"/>
  <circle cx="270" cy="70" r="3" fill="#0EA5E9" opacity="0.1"/>
  <circle cx="270" cy="220" r="5" fill="#10B981" opacity="0.06"/>
  <rect x="140" y="200" width="20" height="2" rx="1" fill="#2563EB" opacity="0.06"/>
  <rect x="230" y="45" width="15" height="2" rx="1" fill="#0EA5E9" opacity="0.06"/>

  <!-- Process label bar -->
  <g transform="translate(25, 260)">
    <rect width="240" height="24" rx="12" fill="#FFFFFF" opacity="0.5" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="18" cy="12" r="5" fill="#2563EB" opacity="0.2"/>
    <rect x="28" y="8" width="3" height="8" rx="1.5" fill="#2563EB" opacity="0.15"/>
    <path d="M50,12 L68,12" stroke="#0EA5E9" stroke-width="1.5" opacity="0.2" stroke-dasharray="3,2"/>
    <polygon points="66,9 72,12 66,15" fill="#0EA5E9" opacity="0.2"/>
    <!-- Gear mini -->
    <circle cx="88" cy="12" r="5" fill="#0EA5E9" opacity="0.15"/>
    <circle cx="88" cy="12" r="2" fill="#0EA5E9" opacity="0.25"/>
    <path d="M115,12 L133,12" stroke="#10B981" stroke-width="1.5" opacity="0.2" stroke-dasharray="3,2"/>
    <polygon points="131,9 137,12 131,15" fill="#10B981" opacity="0.2"/>
    <!-- Grid mini -->
    <rect x="145" y="6" width="12" height="12" rx="2" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-width="0.5"/>
    <line x1="149" y1="6" x2="149" y2="18" stroke="#10B981" stroke-width="0.5" opacity="0.3"/>
    <line x1="153" y1="6" x2="153" y2="18" stroke="#10B981" stroke-width="0.5" opacity="0.3"/>
    <line x1="145" y1="10" x2="157" y2="10" stroke="#10B981" stroke-width="0.5" opacity="0.3"/>
    <line x1="145" y1="14" x2="157" y2="14" stroke="#10B981" stroke-width="0.5" opacity="0.3"/>
    <path d="M175,12 L193,12" stroke="#10B981" stroke-width="1.5" opacity="0.2" stroke-dasharray="3,2"/>
    <polygon points="191,9 197,12 191,15" fill="#10B981" opacity="0.2"/>
    <!-- Check mini -->
    <circle cx="212" cy="12" r="5" fill="#10B981" opacity="0.15"/>
    <path d="M209,12 L211,14 L215,10" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>