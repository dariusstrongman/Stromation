<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 1050 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1050" height="600" rx="16" fill="url(#bg)"/>

  <!-- Subtle accent line at top -->
  <rect x="0" y="0" width="1050" height="4" rx="2" fill="#00E5FF" opacity="0.8"/>

  <!-- Logo icon (simplified workflow nodes) -->
  <g transform="translate(80, 180) scale(0.35)">
    <path d="M333,108 C240,100 125,162 124,252 C123,312 194,328 232,332" fill="none" stroke="#00E5FF" stroke-width="14" stroke-linecap="round"/>
    <path d="M268,344 C366,362 394,444 368,506 C346,558 262,572 168,568" fill="none" stroke="#00E5FF" stroke-width="14" stroke-linecap="round"/>
    <circle cx="355" cy="100" r="24" fill="none" stroke="#00E5FF" stroke-width="2.8"/>
    <circle cx="355" cy="100" r="10" fill="#00E5FF"/>
    <circle cx="250" cy="338" r="20" fill="none" stroke="#00E5FF" stroke-width="2.8"/>
    <circle cx="250" cy="338" r="9" fill="#00E5FF"/>
    <circle cx="145" cy="572" r="24" fill="none" stroke="#00E5FF" stroke-width="2.8"/>
    <circle cx="145" cy="572" r="10" fill="#00E5FF"/>
  </g>

  <!-- Company name -->
  <text x="80" y="440" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="white" letter-spacing="3">STROMATION</text>

  <!-- Tagline -->
  <text x="80" y="480" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="400" fill="#94A3B8" letter-spacing="1.5">WORKFLOW REPLACEMENT STUDIO</text>

  <!-- Name -->
  <text x="620" y="220" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="white">Darius Stroman</text>

  <!-- Title -->
  <text x="620" y="255" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#00E5FF" letter-spacing="1">FOUNDER</text>

  <!-- Contact details -->
  <g font-family="Inter, system-ui, sans-serif" font-size="15" fill="#CBD5E1">
    <text x="620" y="330">darius@stromation.com</text>
    <text x="620" y="360">(855) 932-0493</text>
    <text x="620" y="390">www.stromation.com</text>
    <text x="620" y="420">@stromationhq</text>
  </g>

  <!-- Divider line -->
  <line x1="600" y1="190" x2="600" y2="440" stroke="#00E5FF" stroke-width="1" opacity="0.2"/>

  <!-- Corner accent -->
  <circle cx="980" cy="530" r="40" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.08"/>
  <circle cx="980" cy="530" r="25" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.15"/>
</svg>