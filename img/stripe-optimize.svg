<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="32" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#00E5FF" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/><line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Rocket/chart icon -->
  <g transform="translate(256,195)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="70" opacity="0.15" fill="#10B981" stroke="none"/>
    <!-- Upward chart bars -->
    <rect x="-45" y="10" width="16" height="35" rx="3" fill="#2563EB" opacity="0.5"/>
    <rect x="-20" y="-5" width="16" height="50" rx="3" fill="#2563EB" opacity="0.7"/>
    <rect x="5" y="-25" width="16" height="70" rx="3" fill="#10B981" opacity="0.8"/>
    <rect x="30" y="-45" width="16" height="90" rx="3" fill="#10B981"/>
    <!-- Trend line -->
    <path d="M-37,-10 L-12,-25 L13,-45 L38,-60" stroke="white" stroke-width="3" fill="none" opacity="0.8"/>
    <!-- Arrow tip -->
    <path d="M30,-65 L38,-60 L32,-52" stroke="white" stroke-width="3" fill="none" opacity="0.8"/>
    <!-- Sparkle -->
    <g transform="translate(50,-55)" stroke="#10B981" stroke-width="2" opacity="0.6">
      <line x1="0" y1="-8" x2="0" y2="8"/>
      <line x1="-8" y1="0" x2="8" y2="0"/>
      <line x1="-5" y1="-5" x2="5" y2="5"/>
      <line x1="5" y1="-5" x2="-5" y2="5"/>
    </g>
  </g>
  <!-- Price -->
  <text x="256" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#10B981">$499/mo</text>
  <!-- Tier name -->
  <text x="256" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800" fill="white" letter-spacing="2">OPTIMIZE</text>
  <!-- Brand -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="500" fill="#64748B" letter-spacing="4">STROMATION</text>
  <!-- Accent line (gradient) -->
  <rect x="206" y="350" width="100" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>