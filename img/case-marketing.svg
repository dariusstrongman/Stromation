<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle dot pattern -->
  <g opacity="0.04">
    <circle cx="20" cy="20" r="2" fill="#1E293B"/>
    <circle cx="60" cy="20" r="2" fill="#1E293B"/>
    <circle cx="100" cy="20" r="2" fill="#1E293B"/>
    <circle cx="140" cy="20" r="2" fill="#1E293B"/>
    <circle cx="180" cy="20" r="2" fill="#1E293B"/>
    <circle cx="220" cy="20" r="2" fill="#1E293B"/>
    <circle cx="260" cy="20" r="2" fill="#1E293B"/>
    <circle cx="300" cy="20" r="2" fill="#1E293B"/>
    <circle cx="340" cy="20" r="2" fill="#1E293B"/>
    <circle cx="380" cy="20" r="2" fill="#1E293B"/>
    <circle cx="20" cy="280" r="2" fill="#1E293B"/>
    <circle cx="60" cy="280" r="2" fill="#1E293B"/>
    <circle cx="100" cy="280" r="2" fill="#1E293B"/>
    <circle cx="340" cy="280" r="2" fill="#1E293B"/>
    <circle cx="380" cy="280" r="2" fill="#1E293B"/>
  </g>

  <!-- Lightbulb (Idea) -->
  <g transform="translate(28, 90)">
    <!-- Bulb glow -->
    <circle cx="26" cy="30" r="28" fill="#2563EB" opacity="0.06"/>
    <circle cx="26" cy="30" r="20" fill="#2563EB" opacity="0.08"/>
    <!-- Bulb -->
    <path d="M26,6 C14,6 4,16 4,28 C4,36 9,43 16,46 L16,54 L36,54 L36,46 C43,43 48,36 48,28 C48,16 38,6 26,6 Z" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <!-- Filament -->
    <path d="M20,30 C20,24 26,20 26,26 C26,20 32,24 32,30" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.7"/>
    <!-- Base -->
    <rect x="18" y="54" width="16" height="4" rx="1" fill="#2563EB" opacity="0.3"/>
    <rect x="20" y="58" width="12" height="3" rx="1" fill="#2563EB" opacity="0.2"/>
    <!-- Rays -->
    <line x1="26" y1="-2" x2="26" y2="-8" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="44" y1="10" x2="48" y2="6" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="8" y1="10" x2="4" y2="6" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="52" y1="28" x2="58" y2="28" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="0" y1="28" x2="-6" y2="28" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Arrow: Idea → Draft -->
  <path d="M85,125 L108,125" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="106,122 114,125 106,128" fill="#0EA5E9" opacity="0.5"/>

  <!-- Draft document -->
  <g transform="translate(114, 95)">
    <rect width="48" height="60" rx="5" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <!-- Corner fold -->
    <path d="M34,0 L48,0 L48,14 Z" fill="#F1F5F9" stroke="#2563EB" stroke-width="1"/>
    <path d="M34,0 L34,14 L48,14" fill="none" stroke="#2563EB" stroke-width="1"/>
    <!-- Lines -->
    <rect x="8" y="20" width="30" height="3" rx="1.5" fill="#2563EB" opacity="0.15"/>
    <rect x="8" y="27" width="24" height="3" rx="1.5" fill="#2563EB" opacity="0.12"/>
    <rect x="8" y="34" width="28" height="3" rx="1.5" fill="#0EA5E9" opacity="0.12"/>
    <rect x="8" y="41" width="18" height="3" rx="1.5" fill="#0EA5E9" opacity="0.1"/>
    <rect x="8" y="48" width="26" height="3" rx="1.5" fill="#2563EB" opacity="0.08"/>
    <!-- Pencil icon -->
    <g transform="translate(34, 42)">
      <rect x="0" y="0" width="3" height="12" rx="1" fill="#0EA5E9" opacity="0.6" transform="rotate(-30, 1.5, 6)"/>
    </g>
  </g>

  <!-- Arrow: Draft → Calendar -->
  <path d="M165,125 L188,125" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="186,122 194,125 186,128" fill="#0EA5E9" opacity="0.5"/>

  <!-- Calendar (Schedule) -->
  <g transform="translate(194, 85)">
    <rect width="70" height="80" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <!-- Calendar header -->
    <rect x="1" y="1" width="68" height="18" rx="5" fill="url(#blueGrad)" opacity="0.9"/>
    <!-- Calendar pins -->
    <rect x="16" y="-3" width="4" height="10" rx="2" fill="#1E293B" opacity="0.3"/>
    <rect x="50" y="-3" width="4" height="10" rx="2" fill="#1E293B" opacity="0.3"/>
    <!-- Grid lines -->
    <line x1="0" y1="32" x2="70" y2="32" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="0" y1="46" x2="70" y2="46" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="70" y2="60" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="10" y1="19" x2="10" y2="80" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="22" y1="19" x2="22" y2="80" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="34" y1="19" x2="34" y2="80" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="46" y1="19" x2="46" y2="80" stroke="#E2E8F0" stroke-width="0.5"/>
    <line x1="58" y1="19" x2="58" y2="80" stroke="#E2E8F0" stroke-width="0.5"/>
    <!-- Content blocks in calendar -->
    <rect x="11" y="22" width="10" height="8" rx="2" fill="#2563EB" opacity="0.2"/>
    <rect x="35" y="22" width="10" height="8" rx="2" fill="#0EA5E9" opacity="0.25"/>
    <rect x="47" y="33" width="10" height="8" rx="2" fill="#2563EB" opacity="0.2"/>
    <rect x="23" y="47" width="10" height="8" rx="2" fill="#10B981" opacity="0.2"/>
    <rect x="47" y="47" width="10" height="8" rx="2" fill="#0EA5E9" opacity="0.2"/>
    <rect x="11" y="61" width="10" height="8" rx="2" fill="#0EA5E9" opacity="0.25"/>
    <rect x="35" y="61" width="10" height="8" rx="2" fill="#2563EB" opacity="0.2"/>
    <rect x="59" y="33" width="9" height="8" rx="2" fill="#10B981" opacity="0.2"/>
  </g>

  <!-- Arrow: Calendar → Social -->
  <path d="M268,125 L290,125" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="288,122 296,125 288,128" fill="#0EA5E9" opacity="0.5"/>

  <!-- Publish / Social media platforms -->
  <g transform="translate(295, 75)">
    <!-- Central publish node -->
    <circle cx="35" cy="50" r="22" fill="#FFFFFF" stroke="url(#blueGrad)" stroke-width="2"/>
    <path d="M28,50 L42,50 M35,43 L35,57" stroke="#2563EB" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Broadcast lines -->
    <path d="M24,38 C18,32 18,32 18,32" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M46,38 C52,32 52,32 52,32" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

    <!-- Social platform circles -->
    <!-- Top -->
    <circle cx="35" cy="8" r="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="29" y="3" width="12" height="10" rx="3" fill="#2563EB" opacity="0.2"/>
    <circle cx="35" cy="7" r="2" fill="#2563EB" opacity="0.4"/>
    <line x1="57" y1="50" x2="57" y2="50" stroke="#0EA5E9" stroke-width="2"/>

    <!-- Right -->
    <circle cx="68" cy="50" r="12" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.5"/>
    <rect x="62" y="46" width="12" height="8" rx="2" fill="#0EA5E9" opacity="0.2"/>
    <circle cx="68" cy="48" r="2" fill="#0EA5E9" opacity="0.4"/>

    <!-- Bottom -->
    <circle cx="35" cy="92" r="12" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5"/>
    <path d="M30,88 L35,93 L40,88" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <rect x="31" y="93" width="8" height="4" rx="1" fill="#10B981" opacity="0.2"/>

    <!-- Connection lines from center to platforms -->
    <line x1="35" y1="28" x2="35" y2="20" stroke="#2563EB" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
    <line x1="55" y1="44" x2="57" y2="47" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
    <line x1="35" y1="72" x2="35" y2="80" stroke="#10B981" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
  </g>

  <!-- Flow label arrows at bottom -->
  <g transform="translate(30, 220)">
    <!-- Flow steps -->
    <rect x="0" y="0" width="70" height="28" rx="14" fill="#2563EB" opacity="0.1" stroke="#2563EB" stroke-width="1"/>
    <circle cx="16" cy="14" r="6" fill="#2563EB" opacity="0.2"/>
    <rect x="26" y="10" width="36" height="3" rx="1.5" fill="#2563EB" opacity="0.25"/>
    <rect x="26" y="16" width="24" height="2" rx="1" fill="#2563EB" opacity="0.15"/>

    <path d="M75,14 L85,14" stroke="#0EA5E9" stroke-width="1.5" opacity="0.3"/>
    <polygon points="83,11 89,14 83,17" fill="#0EA5E9" opacity="0.3"/>

    <rect x="92" y="0" width="70" height="28" rx="14" fill="#0EA5E9" opacity="0.1" stroke="#0EA5E9" stroke-width="1"/>
    <circle cx="108" cy="14" r="6" fill="#0EA5E9" opacity="0.2"/>
    <rect x="118" y="10" width="36" height="3" rx="1.5" fill="#0EA5E9" opacity="0.25"/>
    <rect x="118" y="16" width="24" height="2" rx="1" fill="#0EA5E9" opacity="0.15"/>

    <path d="M167,14 L177,14" stroke="#0EA5E9" stroke-width="1.5" opacity="0.3"/>
    <polygon points="175,11 181,14 175,17" fill="#0EA5E9" opacity="0.3"/>

    <rect x="184" y="0" width="70" height="28" rx="14" fill="#2563EB" opacity="0.1" stroke="#2563EB" stroke-width="1"/>
    <circle cx="200" cy="14" r="6" fill="#2563EB" opacity="0.2"/>
    <rect x="210" y="10" width="36" height="3" rx="1.5" fill="#2563EB" opacity="0.25"/>
    <rect x="210" y="16" width="24" height="2" rx="1" fill="#2563EB" opacity="0.15"/>

    <path d="M259,14 L269,14" stroke="#10B981" stroke-width="1.5" opacity="0.3"/>
    <polygon points="267,11 273,14 267,17" fill="#10B981" opacity="0.3"/>

    <rect x="276" y="0" width="70" height="28" rx="14" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
    <circle cx="292" cy="14" r="6" fill="#10B981" opacity="0.2"/>
    <path d="M289,14 L292,17 L298,11" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="302" y="10" width="36" height="3" rx="1.5" fill="#10B981" opacity="0.25"/>
    <rect x="302" y="16" width="24" height="2" rx="1" fill="#10B981" opacity="0.15"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="15" cy="15" r="10" fill="#0EA5E9" opacity="0.05"/>
  <circle cx="390" cy="285" r="12" fill="#2563EB" opacity="0.05"/>
  <rect x="5" y="270" width="30" height="3" rx="1.5" fill="#2563EB" opacity="0.04"/>
  <rect x="365" y="15" width="25" height="3" rx="1.5" fill="#0EA5E9" opacity="0.04"/>
</svg>