<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="deployGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Launch pad / base -->
  <ellipse cx="40" cy="68" rx="18" ry="4" fill="#2563EB" opacity="0.12"/>

  <!-- Rocket body -->
  <path d="M40,12 Q32,24 32,42 L34,48 L46,48 L48,42 Q48,24 40,12 Z" fill="url(#deployGrad)" stroke="none"/>
  <!-- Rocket window -->
  <circle cx="40" cy="30" r="5" fill="#F8FAFC" stroke="white" stroke-width="1" opacity="0.9"/>
  <circle cx="40" cy="30" r="3" fill="#0EA5E9" opacity="0.3"/>
  <!-- Window glare -->
  <circle cx="38.5" cy="28.5" r="1.2" fill="white" opacity="0.6"/>

  <!-- Rocket body stripe -->
  <rect x="36" y="38" width="8" height="3" rx="1" fill="white" opacity="0.25"/>

  <!-- Fins -->
  <path d="M32,42 L26,52 L32,48 Z" fill="#2563EB" opacity="0.85"/>
  <path d="M48,42 L54,52 L48,48 Z" fill="#2563EB" opacity="0.85"/>

  <!-- Rocket nozzle -->
  <path d="M35,48 L37,52 L43,52 L45,48 Z" fill="#1E293B" opacity="0.6"/>

  <!-- Flame / exhaust -->
  <path d="M37,52 Q38,60 40,65 Q42,60 43,52" fill="url(#flameGrad)" opacity="0.7"/>
  <path d="M38.5,52 Q39.5,58 40,62 Q40.5,58 41.5,52" fill="#0EA5E9" opacity="0.5"/>

  <!-- Speed lines -->
  <line x1="24" y1="38" x2="24" y2="46" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="20" y1="42" x2="20" y2="48" stroke="#0EA5E9" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
  <line x1="56" y1="38" x2="56" y2="46" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="60" y1="42" x2="60" y2="48" stroke="#0EA5E9" stroke-width="1" stroke-linecap="round" opacity="0.15"/>

  <!-- Stars / particles -->
  <circle cx="16" cy="18" r="1.5" fill="#0EA5E9" opacity="0.25"/>
  <circle cx="64" cy="14" r="1" fill="#2563EB" opacity="0.2"/>
  <circle cx="22" cy="26" r="1" fill="#2563EB" opacity="0.15"/>
  <circle cx="60" cy="28" r="1.5" fill="#0EA5E9" opacity="0.18"/>
</svg>