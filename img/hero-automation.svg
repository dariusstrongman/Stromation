<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="hubShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#2563EB" flood-opacity="0.25"/>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background decorative dotted circles for depth -->
  <circle cx="200" cy="150" r="130" fill="none" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="4 6"/>
  <circle cx="200" cy="150" r="105" fill="none" stroke="#0EA5E9" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="3 5"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="#2563EB" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- Extra decorative dots scattered -->
  <circle cx="55" cy="45" r="3" fill="#2563EB" opacity="0.08"/>
  <circle cx="340" cy="55" r="4" fill="#0EA5E9" opacity="0.07"/>
  <circle cx="45" cy="240" r="3.5" fill="#0EA5E9" opacity="0.06"/>
  <circle cx="360" cy="250" r="3" fill="#2563EB" opacity="0.09"/>
  <circle cx="120" cy="35" r="2" fill="#0EA5E9" opacity="0.1"/>
  <circle cx="290" cy="270" r="2.5" fill="#2563EB" opacity="0.07"/>

  <!-- Connection lines from hub to nodes -->
  <!-- To Email (top-left) -->
  <line x1="200" y1="150" x2="85" y2="68" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- To Database (top-right) -->
  <line x1="200" y1="150" x2="315" y2="68" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- To Chart (right) -->
  <line x1="200" y1="150" x2="335" y2="185" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- To Gear (bottom-left) -->
  <line x1="200" y1="150" x2="65" y2="185" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- To Chat (bottom) -->
  <line x1="200" y1="150" x2="200" y2="262" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Small dots along connection lines -->
  <circle cx="142" cy="109" r="2.5" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="257" cy="109" r="2.5" fill="#2563EB" opacity="0.5"/>
  <circle cx="268" cy="168" r="2.5" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="132" cy="168" r="2.5" fill="#2563EB" opacity="0.5"/>
  <circle cx="200" cy="206" r="2.5" fill="#0EA5E9" opacity="0.5"/>

  <!-- Central hexagonal hub -->
  <polygon points="200,110 235,130 235,170 200,190 165,170 165,130" fill="url(#hubGrad)" stroke="none" filter="url(#hubShadow)"/>
  <!-- Hub inner highlight -->
  <polygon points="200,118 228,134 228,166 200,182 172,166 172,134" fill="white" opacity="0.12"/>
  <!-- Hub icon: workflow/nodes symbol -->
  <circle cx="200" cy="143" r="4" fill="white" opacity="0.9"/>
  <circle cx="189" cy="158" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="211" cy="158" r="3.5" fill="white" opacity="0.9"/>
  <line x1="200" y1="143" x2="189" y2="158" stroke="white" stroke-width="1.5" opacity="0.9" stroke-linecap="round"/>
  <line x1="200" y1="143" x2="211" y2="158" stroke="white" stroke-width="1.5" opacity="0.9" stroke-linecap="round"/>
  <line x1="189" y1="158" x2="211" y2="158" stroke="white" stroke-width="1.5" opacity="0.9" stroke-linecap="round"/>

  <!-- NODE 1: Email (top-left) -->
  <g filter="url(#nodeShadow)">
    <rect x="58" y="41" width="54" height="54" rx="12" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
    <rect x="58" y="41" width="54" height="54" rx="12" fill="url(#nodeGrad1)"/>
    <!-- Envelope icon -->
    <rect x="72" y="56" width="26" height="18" rx="3" fill="none" stroke="#2563EB" stroke-width="2"/>
    <polyline points="72,56 85,66 98,56" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- NODE 2: Database (top-right) -->
  <g filter="url(#nodeShadow)">
    <rect x="288" y="41" width="54" height="54" rx="12" fill="#F8FAFC" stroke="#0EA5E9" stroke-width="2"/>
    <rect x="288" y="41" width="54" height="54" rx="12" fill="url(#nodeGrad1)"/>
    <!-- Cylinder / database icon -->
    <ellipse cx="315" cy="58" rx="13" ry="5" fill="none" stroke="#0EA5E9" stroke-width="2"/>
    <line x1="302" y1="58" x2="302" y2="76" stroke="#0EA5E9" stroke-width="2"/>
    <line x1="328" y1="58" x2="328" y2="76" stroke="#0EA5E9" stroke-width="2"/>
    <ellipse cx="315" cy="76" rx="13" ry="5" fill="none" stroke="#0EA5E9" stroke-width="2"/>
    <path d="M302,67 Q315,72 328,67" fill="none" stroke="#0EA5E9" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- NODE 3: Chart (right) -->
  <g filter="url(#nodeShadow)">
    <rect x="308" y="158" width="54" height="54" rx="12" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
    <rect x="308" y="158" width="54" height="54" rx="12" fill="url(#nodeGrad1)"/>
    <!-- Bar chart icon -->
    <rect x="321" y="183" width="6" height="16" rx="1" fill="#2563EB" opacity="0.7"/>
    <rect x="332" y="175" width="6" height="24" rx="1" fill="#2563EB"/>
    <rect x="343" y="179" width="6" height="20" rx="1" fill="#0EA5E9"/>
    <line x1="318" y1="199" x2="352" y2="199" stroke="#1E293B" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- NODE 4: Gear (bottom-left) -->
  <g filter="url(#nodeShadow)">
    <rect x="38" y="158" width="54" height="54" rx="12" fill="#F8FAFC" stroke="#0EA5E9" stroke-width="2"/>
    <rect x="38" y="158" width="54" height="54" rx="12" fill="url(#nodeGrad1)"/>
    <!-- Gear icon -->
    <circle cx="65" cy="185" r="8" fill="none" stroke="#2563EB" stroke-width="2"/>
    <circle cx="65" cy="185" r="3" fill="#2563EB" opacity="0.4"/>
    <!-- Gear teeth -->
    <line x1="65" y1="174" x2="65" y2="177" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="65" y1="193" x2="65" y2="196" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="54" y1="185" x2="57" y2="185" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="73" y1="185" x2="76" y2="185" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="57.2" y1="177.2" x2="59.3" y2="179.3" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="70.7" y1="190.7" x2="72.8" y2="192.8" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="57.2" y1="192.8" x2="59.3" y2="190.7" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="70.7" y1="179.3" x2="72.8" y2="177.2" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- NODE 5: Chat bubble (bottom) -->
  <g filter="url(#nodeShadow)">
    <rect x="173" y="235" width="54" height="54" rx="12" fill="#F8FAFC" stroke="#2563EB" stroke-width="2"/>
    <rect x="173" y="235" width="54" height="54" rx="12" fill="url(#nodeGrad1)"/>
    <!-- Chat bubble icon -->
    <rect x="185" y="248" width="24" height="16" rx="4" fill="none" stroke="#2563EB" stroke-width="2"/>
    <polygon points="192,264 196,270 200,264" fill="none" stroke="#2563EB" stroke-width="2" stroke-linejoin="round"/>
    <!-- Chat dots -->
    <circle cx="193" cy="256" r="1.5" fill="#0EA5E9"/>
    <circle cx="200" cy="256" r="1.5" fill="#0EA5E9"/>
    <circle cx="207" cy="256" r="1.5" fill="#0EA5E9" opacity="0.5"/>
  </g>

  <!-- Outer decorative arcs -->
  <path d="M100,30 Q200,10 300,30" fill="none" stroke="#2563EB" stroke-opacity="0.06" stroke-width="1"/>
  <path d="M100,270 Q200,290 300,270" fill="none" stroke="#0EA5E9" stroke-opacity="0.06" stroke-width="1"/>
</svg>