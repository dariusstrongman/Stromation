<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="supportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="60%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M40,10 L58,20 Q60,21 60,23 L60,38 Q60,54 40,68 Q20,54 20,38 L20,23 Q20,21 22,20 Z" fill="url(#shieldGrad)" stroke="none"/>
  <!-- Shield inner highlight -->
  <path d="M40,15 L54,23 L54,37 Q54,50 40,62 Q26,50 26,37 L26,23 Z" fill="white" opacity="0.1"/>

  <!-- Checkmark inside shield -->
  <polyline points="30,39 37,47 52,30" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Success glow ring -->
  <circle cx="40" cy="39" r="18" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.25"/>

  <!-- Small success dots -->
  <circle cx="40" cy="4" r="2" fill="#10B981" opacity="0.3"/>
  <circle cx="14" cy="30" r="1.5" fill="#10B981" opacity="0.2"/>
  <circle cx="66" cy="30" r="1.5" fill="#10B981" opacity="0.2"/>
  <circle cx="14" cy="56" r="1" fill="#2563EB" opacity="0.15"/>
  <circle cx="66" cy="56" r="1" fill="#2563EB" opacity="0.15"/>
</svg>