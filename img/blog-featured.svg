<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bulbGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#0EA5E9;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0.05"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Center glow -->
  <circle cx="200" cy="150" r="120" fill="url(#centerGlow)"/>

  <!-- Circuit-like connection lines (background layer) -->
  <g stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.12">
    <!-- Horizontal lines -->
    <path d="M70,100 L120,100 L120,80"/>
    <path d="M70,200 L110,200 L110,220"/>
    <path d="M280,80 L330,80 L330,100"/>
    <path d="M290,220 L340,220 L340,200"/>
    <!-- Diagonal connections -->
    <path d="M120,80 L155,65"/>
    <path d="M110,220 L145,235"/>
    <path d="M255,65 L280,80"/>
    <path d="M260,235 L290,220"/>
  </g>

  <!-- Circuit dots at bends -->
  <g fill="#2563EB" opacity="0.2">
    <circle cx="120" cy="100" r="2.5"/>
    <circle cx="120" cy="80" r="2.5"/>
    <circle cx="110" cy="200" r="2.5"/>
    <circle cx="110" cy="220" r="2.5"/>
    <circle cx="280" cy="80" r="2.5"/>
    <circle cx="330" cy="80" r="2.5"/>
    <circle cx="330" cy="100" r="2.5"/>
    <circle cx="290" cy="220" r="2.5"/>
    <circle cx="340" cy="220" r="2.5"/>
    <circle cx="340" cy="200" r="2.5"/>
  </g>

  <!-- Connection lines from center lightbulb to surrounding nodes -->
  <g stroke="#0EA5E9" stroke-width="2" fill="none" opacity="0.2" stroke-dasharray="6,4">
    <!-- To gear (top-left) -->
    <path d="M180,125 L155,85"/>
    <!-- To envelope (top-right) -->
    <path d="M220,125 L250,85"/>
    <!-- To chart (bottom-right) -->
    <path d="M225,170 L260,215"/>
    <!-- To clock (bottom-left) -->
    <path d="M175,170 L145,215"/>
    <!-- To top node -->
    <path d="M200,115 L200,60"/>
    <!-- To bottom node -->
    <path d="M200,185 L200,245"/>
    <!-- To left node -->
    <path d="M168,150 L85,150"/>
    <!-- To right node -->
    <path d="M232,150 L315,150"/>
  </g>

  <!-- Central lightbulb -->
  <g transform="translate(200, 150)">
    <!-- Outer glow rings -->
    <circle cx="0" cy="0" r="45" fill="url(#bulbGlow)"/>
    <circle cx="0" cy="0" r="36" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="0" cy="0" r="30" fill="#FFFFFF" stroke="url(#blueGrad)" stroke-width="2.5"/>
    <!-- Bulb shape -->
    <path d="M0,-20 C-12,-20 -18,-12 -18,-2 C-18,6 -12,12 -8,16 L-8,22 L8,22 L8,16 C12,12 18,6 18,-2 C18,-12 12,-20 0,-20 Z" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <!-- Inner glow -->
    <path d="M0,-14 C-7,-14 -12,-8 -12,-2 C-12,4 -7,8 -5,11 L5,11 C7,8 12,4 12,-2 C12,-8 7,-14 0,-14 Z" fill="#0EA5E9" opacity="0.08"/>
    <!-- Filament -->
    <path d="M-4,-2 C-4,-8 0,-10 0,-5 C0,-10 4,-8 4,-2" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
    <line x1="-4" y1="2" x2="4" y2="2" stroke="#0EA5E9" stroke-width="1" opacity="0.4"/>
    <!-- Base -->
    <rect x="-7" y="22" width="14" height="4" rx="1.5" fill="#2563EB" opacity="0.3"/>
    <rect x="-5" y="26" width="10" height="3" rx="1.5" fill="#2563EB" opacity="0.2"/>
    <rect x="-4" y="29" width="8" height="2" rx="1" fill="#2563EB" opacity="0.15"/>
    <!-- Rays -->
    <line x1="0" y1="-28" x2="0" y2="-34" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="18" y1="-22" x2="22" y2="-28" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
    <line x1="-18" y1="-22" x2="-22" y2="-28" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
    <line x1="24" y1="-10" x2="30" y2="-12" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    <line x1="-24" y1="-10" x2="-30" y2="-12" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Node 1: Gear (top-left) -->
  <g transform="translate(140, 65)">
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#2563EB" opacity="0.04"/>
    <!-- Gear -->
    <path d="M-2,-12 L2,-12 L2.5,-9 C3.5,-9 4,-8.5 5,-8 L7.5,-10 L10,-7.5 L8,-5 C8.5,-4 9,-3.5 9,-2.5 L12,-2 L12,2 L9,2.5 C9,3.5 8.5,4 8,5 L10,7.5 L7.5,10 L5,8 C4,8.5 3.5,9 2.5,9 L2,12 L-2,12 L-2.5,9 C-3.5,9 -4,8.5 -5,8 L-7.5,10 L-10,7.5 L-8,5 C-8.5,4 -9,3.5 -9,2.5 L-12,2 L-12,-2 L-9,-2.5 C-9,-3.5 -8.5,-4 -8,-5 L-10,-7.5 L-7.5,-10 L-5,-8 C-4,-8.5 -3.5,-9 -2.5,-9 Z" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="1.5" fill="#0EA5E9" opacity="0.5"/>
  </g>

  <!-- Node 2: Envelope (top-right) -->
  <g transform="translate(260, 65)">
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#0EA5E9" opacity="0.04"/>
    <!-- Envelope -->
    <rect x="-11" y="-7" width="22" height="15" rx="3" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.5"/>
    <path d="M-11,-7 L0,2 L11,-7" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M-11,8 L-4,1" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
    <path d="M11,8 L4,1" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.3"/>
    <!-- Notification dot -->
    <circle cx="9" cy="-6" r="3.5" fill="#2563EB" opacity="0.4"/>
  </g>

  <!-- Node 3: Chart (bottom-right) -->
  <g transform="translate(265, 230)">
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#10B981" opacity="0.04"/>
    <!-- Bar chart -->
    <rect x="-10" y="2" width="5" height="8" rx="1" fill="#10B981" opacity="0.4"/>
    <rect x="-3" y="-3" width="5" height="13" rx="1" fill="#0EA5E9" opacity="0.5"/>
    <rect x="4" y="-8" width="5" height="18" rx="1" fill="#2563EB" opacity="0.4"/>
    <!-- Trend line -->
    <path d="M-9,-2 L-1,-5 L5,-10" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <circle cx="5" cy="-10" r="2" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Node 4: Clock (bottom-left) -->
  <g transform="translate(135, 230)">
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#2563EB" opacity="0.04"/>
    <!-- Clock face -->
    <circle cx="0" cy="0" r="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Hour markers -->
    <line x1="0" y1="-10" x2="0" y2="-8" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="0" x2="8" y2="0" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="10" x2="0" y2="8" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
    <line x1="-10" y1="0" x2="-8" y2="0" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-6" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="5" y2="3" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="1.5" fill="#2563EB"/>
    <!-- Motion arc -->
    <path d="M8,-10 C14,-6 14,6 8,10" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Node 5: Top center (database/data) -->
  <g transform="translate(200, 40)">
    <circle cx="0" cy="0" r="18" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="0" cy="0" r="14" fill="#2563EB" opacity="0.04"/>
    <!-- Database icon -->
    <ellipse cx="0" cy="-6" rx="9" ry="3.5" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
    <path d="M-9,-6 L-9,0 C-9,2 -5,3.5 0,3.5 C5,3.5 9,2 9,0 L9,-6" fill="none" stroke="#2563EB" stroke-width="1.2"/>
    <path d="M-9,0 L-9,6 C-9,8 -5,9.5 0,9.5 C5,9.5 9,8 9,6 L9,0" fill="none" stroke="#0EA5E9" stroke-width="1.2"/>
    <path d="M-9,-3 C-9,-1 -5,0.5 0,0.5 C5,0.5 9,-1 9,-3" fill="none" stroke="#2563EB" stroke-width="0.8" opacity="0.4"/>
    <path d="M-9,3 C-9,5 -5,6.5 0,6.5 C5,6.5 9,5 9,3" fill="none" stroke="#0EA5E9" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Node 6: Bottom center (play/automation) -->
  <g transform="translate(200, 260)">
    <circle cx="0" cy="0" r="18" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <circle cx="0" cy="0" r="14" fill="#10B981" opacity="0.04"/>
    <!-- Play/automation icon (circular arrows) -->
    <path d="M-6,-8 C-10,-4 -10,4 -6,8" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M6,8 C10,4 10,-4 6,-8" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="-4,-10 -8,-6 -2,-6" fill="#10B981" opacity="0.6"/>
    <polygon points="4,10 8,6 2,6" fill="#10B981" opacity="0.6"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#10B981" opacity="0.3"/>
    <circle cx="0" cy="0" r="1.5" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Node 7: Left (workflow/nodes) -->
  <g transform="translate(65, 150)">
    <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="0" cy="0" r="16" fill="#2563EB" opacity="0.04"/>
    <!-- Workflow nodes -->
    <rect x="-8" y="-8" width="7" height="7" rx="2" fill="#2563EB" opacity="0.3" stroke="#2563EB" stroke-width="1"/>
    <rect x="1" y="-8" width="7" height="7" rx="2" fill="#0EA5E9" opacity="0.3" stroke="#0EA5E9" stroke-width="1"/>
    <rect x="-8" y="1" width="7" height="7" rx="2" fill="#0EA5E9" opacity="0.25" stroke="#0EA5E9" stroke-width="1"/>
    <rect x="1" y="1" width="7" height="7" rx="2" fill="#2563EB" opacity="0.25" stroke="#2563EB" stroke-width="1"/>
    <!-- Connection lines between mini nodes -->
    <line x1="-1" y1="-4.5" x2="1" y2="-4.5" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
    <line x1="-4.5" y1="-1" x2="-4.5" y2="1" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
    <line x1="4.5" y1="-1" x2="4.5" y2="1" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
    <line x1="-1" y1="4.5" x2="1" y2="4.5" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Node 8: Right (lightning/trigger) -->
  <g transform="translate(335, 150)">
    <circle cx="0" cy="0" r="20" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="0" cy="0" r="16" fill="#0EA5E9" opacity="0.04"/>
    <!-- Lightning bolt -->
    <path d="M2,-10 L-4,-1 L1,-1 L-2,10 L6,1 L1,1 Z" fill="#0EA5E9" opacity="0.5" stroke="#0EA5E9" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- Outer ring of small dots (orbiting feel) -->
  <g fill="#2563EB" opacity="0.08">
    <circle cx="200" cy="8" r="3"/>
    <circle cx="280" cy="20" r="2.5"/>
    <circle cx="340" cy="60" r="2"/>
    <circle cx="375" cy="120" r="2.5"/>
    <circle cx="385" cy="185" r="2"/>
    <circle cx="365" cy="245" r="3"/>
    <circle cx="310" cy="280" r="2"/>
    <circle cx="200" cy="292" r="2.5"/>
    <circle cx="90" cy="280" r="2"/>
    <circle cx="35" cy="245" r="2.5"/>
    <circle cx="15" cy="185" r="3"/>
    <circle cx="20" cy="120" r="2"/>
    <circle cx="55" cy="60" r="2.5"/>
    <circle cx="120" cy="20" r="2"/>
  </g>

  <!-- Pulse rings around center (innovation feel) -->
  <circle cx="200" cy="150" r="50" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.08"/>
  <circle cx="200" cy="150" r="70" fill="none" stroke="#2563EB" stroke-width="0.5" opacity="0.06"/>
  <circle cx="200" cy="150" r="95" fill="none" stroke="#0EA5E9" stroke-width="0.5" opacity="0.04"/>
  <circle cx="200" cy="150" r="130" fill="none" stroke="#2563EB" stroke-width="0.5" opacity="0.03"/>

  <!-- Small sparkle accents -->
  <g opacity="0.2">
    <path d="M160,110 L162,106 L164,110 L168,112 L164,114 L162,118 L160,114 L156,112 Z" fill="#0EA5E9"/>
    <path d="M245,108 L246,105 L247,108 L250,109 L247,110 L246,113 L245,110 L242,109 Z" fill="#2563EB"/>
    <path d="M170,195 L171,192 L172,195 L175,196 L172,197 L171,200 L170,197 L167,196 Z" fill="#10B981"/>
  </g>
</svg>