<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Chat interface mockup -->
  <g transform="translate(20, 30)">
    <!-- Chat window -->
    <rect width="140" height="200" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    <!-- Chat header -->
    <rect x="1" y="1" width="138" height="30" rx="9" fill="url(#blueGrad)" opacity="0.9"/>
    <!-- Bot avatar in header -->
    <circle cx="20" cy="16" r="9" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="20" cy="13" r="3.5" fill="#FFFFFF" opacity="0.6"/>
    <path d="M13,20 C13,17 27,17 27,20" fill="#FFFFFF" opacity="0.4"/>
    <!-- Status dot -->
    <circle cx="28" cy="20" r="3" fill="#10B981" stroke="#FFFFFF" stroke-width="1"/>
    <!-- Header bars -->
    <rect x="35" y="10" width="40" height="3" rx="1.5" fill="#FFFFFF" opacity="0.5"/>
    <rect x="35" y="16" width="28" height="2" rx="1" fill="#FFFFFF" opacity="0.3"/>

    <!-- User message bubble -->
    <g transform="translate(40, 42)">
      <rect width="90" height="28" rx="10" fill="#2563EB" opacity="0.12"/>
      <rect x="8" y="7" width="60" height="3" rx="1.5" fill="#2563EB" opacity="0.3"/>
      <rect x="8" y="14" width="42" height="3" rx="1.5" fill="#2563EB" opacity="0.2"/>
    </g>

    <!-- Bot message bubble -->
    <g transform="translate(10, 78)">
      <rect width="100" height="35" rx="10" fill="url(#chatGrad)" stroke="#0EA5E9" stroke-width="1"/>
      <!-- Bot avatar small -->
      <circle cx="-4" cy="12" r="6" fill="#0EA5E9" opacity="0.2" stroke="#0EA5E9" stroke-width="1"/>
      <rect x="8" y="8" width="70" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
      <rect x="8" y="15" width="52" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <rect x="8" y="22" width="60" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
    </g>

    <!-- User message bubble 2 -->
    <g transform="translate(50, 122)">
      <rect width="80" height="22" rx="10" fill="#2563EB" opacity="0.12"/>
      <rect x="8" y="7" width="50" height="3" rx="1.5" fill="#2563EB" opacity="0.3"/>
    </g>

    <!-- Bot message bubble 2 -->
    <g transform="translate(10, 152)">
      <rect width="110" height="28" rx="10" fill="url(#chatGrad)" stroke="#0EA5E9" stroke-width="1"/>
      <rect x="8" y="7" width="75" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
      <rect x="8" y="14" width="58" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
    </g>

    <!-- Input bar -->
    <rect x="5" y="185" width="130" height="10" rx="5" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="12" y="189" width="40" height="2" rx="1" fill="#1E293B" opacity="0.1"/>
    <circle cx="125" cy="190" r="4" fill="#2563EB" opacity="0.3"/>
  </g>

  <!-- AI Bot avatar (center) -->
  <g transform="translate(175, 95)">
    <!-- Outer ring -->
    <circle cx="25" cy="25" r="28" fill="#2563EB" opacity="0.06"/>
    <circle cx="25" cy="25" r="22" fill="#FFFFFF" stroke="url(#blueGrad)" stroke-width="2"/>
    <!-- Robot face -->
    <rect x="12" y="15" width="26" height="20" rx="6" fill="#0EA5E9" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="19" cy="23" r="3" fill="#2563EB" opacity="0.7"/>
    <circle cx="31" cy="23" r="3" fill="#2563EB" opacity="0.7"/>
    <circle cx="19.5" cy="22.5" r="1" fill="#FFFFFF"/>
    <circle cx="31.5" cy="22.5" r="1" fill="#FFFFFF"/>
    <!-- Mouth -->
    <path d="M20,30 C22,33 28,33 30,30" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="25" y1="15" x2="25" y2="6" stroke="#0EA5E9" stroke-width="1.5"/>
    <circle cx="25" cy="5" r="2.5" fill="#0EA5E9" opacity="0.6"/>
    <!-- Signal waves -->
    <path d="M8,12 C5,8 5,4 8,0" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
    <path d="M42,12 C45,8 45,4 42,0" fill="none" stroke="#0EA5E9" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Branching arrows from bot to ticket categories -->
  <g>
    <!-- Arrow to top category -->
    <path d="M225,110 C250,105 260,75 280,70" fill="none" stroke="#2563EB" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
    <polygon points="278,66 284,70 278,74" fill="#2563EB" opacity="0.4"/>

    <!-- Arrow to middle category -->
    <path d="M225,125 C255,125 260,130 280,130" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
    <polygon points="278,126 284,130 278,134" fill="#0EA5E9" opacity="0.4"/>

    <!-- Arrow to bottom category -->
    <path d="M225,140 C250,145 260,185 280,190" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="5,3" opacity="0.4"/>
    <polygon points="278,186 284,190 278,194" fill="#10B981" opacity="0.4"/>
  </g>

  <!-- Ticket category 1: Urgent -->
  <g transform="translate(285, 40)">
    <rect width="95" height="58" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Category indicator -->
    <rect x="0" y="0" width="6" height="58" rx="3" fill="#2563EB" opacity="0.8"/>
    <!-- Ticket rows -->
    <g transform="translate(14, 8)">
      <rect width="70" height="12" rx="4" fill="#2563EB" opacity="0.06"/>
      <circle cx="8" cy="6" r="4" fill="#2563EB" opacity="0.15"/>
      <rect x="16" y="3" width="35" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
      <circle cx="64" cy="6" r="3" fill="#2563EB" opacity="0.3"/>
    </g>
    <g transform="translate(14, 24)">
      <rect width="70" height="12" rx="4" fill="#2563EB" opacity="0.04"/>
      <circle cx="8" cy="6" r="4" fill="#2563EB" opacity="0.1"/>
      <rect x="16" y="3" width="40" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <circle cx="64" cy="6" r="3" fill="#2563EB" opacity="0.2"/>
    </g>
    <g transform="translate(14, 40)">
      <rect width="70" height="12" rx="4" fill="#2563EB" opacity="0.04"/>
      <circle cx="8" cy="6" r="4" fill="#2563EB" opacity="0.1"/>
      <rect x="16" y="3" width="30" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <circle cx="64" cy="6" r="3" fill="#2563EB" opacity="0.15"/>
    </g>
  </g>

  <!-- Ticket category 2: General -->
  <g transform="translate(285, 108)">
    <rect width="95" height="44" rx="8" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="44" rx="3" fill="#0EA5E9" opacity="0.8"/>
    <g transform="translate(14, 8)">
      <rect width="70" height="12" rx="4" fill="#0EA5E9" opacity="0.06"/>
      <circle cx="8" cy="6" r="4" fill="#0EA5E9" opacity="0.15"/>
      <rect x="16" y="3" width="38" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
      <circle cx="64" cy="6" r="3" fill="#0EA5E9" opacity="0.3"/>
    </g>
    <g transform="translate(14, 24)">
      <rect width="70" height="12" rx="4" fill="#0EA5E9" opacity="0.04"/>
      <circle cx="8" cy="6" r="4" fill="#0EA5E9" opacity="0.1"/>
      <rect x="16" y="3" width="32" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <circle cx="64" cy="6" r="3" fill="#0EA5E9" opacity="0.2"/>
    </g>
  </g>

  <!-- Ticket category 3: Resolved -->
  <g transform="translate(285, 164)">
    <rect width="95" height="58" rx="8" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="58" rx="3" fill="#10B981" opacity="0.8"/>
    <g transform="translate(14, 8)">
      <rect width="70" height="12" rx="4" fill="#10B981" opacity="0.06"/>
      <circle cx="8" cy="6" r="4" fill="#10B981" opacity="0.15"/>
      <rect x="16" y="3" width="35" height="3" rx="1.5" fill="#1E293B" opacity="0.12"/>
      <!-- Checkmark -->
      <path d="M60,4 L63,7 L68,2" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(14, 24)">
      <rect width="70" height="12" rx="4" fill="#10B981" opacity="0.04"/>
      <circle cx="8" cy="6" r="4" fill="#10B981" opacity="0.1"/>
      <rect x="16" y="3" width="28" height="3" rx="1.5" fill="#1E293B" opacity="0.1"/>
      <path d="M60,4 L63,7 L68,2" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    </g>
    <g transform="translate(14, 40)">
      <rect width="70" height="12" rx="4" fill="#10B981" opacity="0.04"/>
      <circle cx="8" cy="6" r="4" fill="#10B981" opacity="0.1"/>
      <rect x="16" y="3" width="36" height="3" rx="1.5" fill="#1E293B" opacity="0.08"/>
      <path d="M60,4 L63,7 L68,2" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>

  <!-- Stats bar at bottom -->
  <g transform="translate(20, 255)">
    <rect width="360" height="30" rx="8" fill="#FFFFFF" opacity="0.6" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Stat blocks -->
    <circle cx="20" cy="15" r="5" fill="#2563EB" opacity="0.15"/>
    <rect x="30" y="9" width="40" height="3" rx="1.5" fill="#2563EB" opacity="0.15"/>
    <rect x="30" y="16" width="28" height="2" rx="1" fill="#1E293B" opacity="0.08"/>

    <line x1="90" y1="5" x2="90" y2="25" stroke="#E2E8F0" stroke-width="1"/>

    <circle cx="110" cy="15" r="5" fill="#0EA5E9" opacity="0.15"/>
    <rect x="120" y="9" width="45" height="3" rx="1.5" fill="#0EA5E9" opacity="0.15"/>
    <rect x="120" y="16" width="30" height="2" rx="1" fill="#1E293B" opacity="0.08"/>

    <line x1="180" y1="5" x2="180" y2="25" stroke="#E2E8F0" stroke-width="1"/>

    <circle cx="200" cy="15" r="5" fill="#10B981" opacity="0.15"/>
    <rect x="210" y="9" width="50" height="3" rx="1.5" fill="#10B981" opacity="0.15"/>
    <rect x="210" y="16" width="34" height="2" rx="1" fill="#1E293B" opacity="0.08"/>

    <line x1="275" y1="5" x2="275" y2="25" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Mini bar chart -->
    <rect x="290" y="18" width="8" height="7" rx="1" fill="#2563EB" opacity="0.2"/>
    <rect x="302" y="12" width="8" height="13" rx="1" fill="#0EA5E9" opacity="0.25"/>
    <rect x="314" y="8" width="8" height="17" rx="1" fill="#10B981" opacity="0.3"/>
    <rect x="326" y="5" width="8" height="20" rx="1" fill="#2563EB" opacity="0.2"/>
  </g>

  <!-- Decorative -->
  <circle cx="175" cy="30" r="8" fill="#0EA5E9" opacity="0.05"/>
  <circle cx="175" cy="270" r="10" fill="#2563EB" opacity="0.04"/>
</svg>