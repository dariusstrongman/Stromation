<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#1E293B" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="300" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Shopify store icon (left) -->
  <g transform="translate(30, 55)">
    <rect width="90" height="110" rx="8" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="2"/>
    <!-- Shopping bag -->
    <rect x="25" y="20" width="40" height="45" rx="4" fill="#2563EB" opacity="0.1" stroke="#2563EB" stroke-width="1.5"/>
    <path d="M33,20 C33,12 45,4 57,20" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
    <!-- Product lines -->
    <rect x="12" y="78" width="66" height="5" rx="2.5" fill="#2563EB" opacity="0.12"/>
    <rect x="12" y="88" width="45" height="4" rx="2" fill="#1E293B" opacity="0.08"/>
    <rect x="12" y="97" width="55" height="4" rx="2" fill="#1E293B" opacity="0.06"/>
    <text x="45" y="50" font-family="Inter, sans-serif" font-size="8" fill="#2563EB" text-anchor="middle" font-weight="600">Shopify</text>
  </g>

  <!-- Sync arrows (bidirectional) -->
  <g transform="translate(130, 95)">
    <path d="M0,15 L50,15" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <polygon points="48,11 58,15 48,19" fill="#0EA5E9" opacity="0.7"/>
    <path d="M58,25 L8,25" stroke="#2563EB" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
    <polygon points="10,21 0,25 10,29" fill="#2563EB" opacity="0.7"/>
    <!-- Sync icon -->
    <text x="29" y="8" font-family="Inter, sans-serif" font-size="8" fill="#64748B" text-anchor="middle" font-weight="600">SYNC</text>
  </g>

  <!-- Google Sheets (center-right) -->
  <g transform="translate(200, 55)">
    <rect width="90" height="110" rx="8" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="2"/>
    <!-- Spreadsheet grid -->
    <rect x="12" y="15" width="66" height="60" rx="4" fill="white" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="12" y1="30" x2="78" y2="30" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="45" x2="78" y2="45" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="60" x2="78" y2="60" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="15" x2="35" y2="75" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
    <line x1="58" y1="15" x2="58" y2="75" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
    <!-- Data cells -->
    <rect x="14" y="17" width="18" height="10" rx="1" fill="#2563EB" opacity="0.1"/>
    <rect x="37" y="17" width="18" height="10" rx="1" fill="#10B981" opacity="0.15"/>
    <rect x="60" y="17" width="16" height="10" rx="1" fill="#2563EB" opacity="0.08"/>
    <rect x="14" y="32" width="18" height="10" rx="1" fill="#1E293B" opacity="0.06"/>
    <rect x="37" y="32" width="18" height="10" rx="1" fill="#10B981" opacity="0.1"/>
    <rect x="14" y="47" width="18" height="10" rx="1" fill="#1E293B" opacity="0.06"/>
    <rect x="37" y="47" width="18" height="10" rx="1" fill="#EF4444" opacity="0.15"/>
    <text x="45" y="92" font-family="Inter, sans-serif" font-size="8" fill="#0EA5E9" text-anchor="middle" font-weight="600">Inventory</text>
    <text x="45" y="102" font-family="Inter, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Google Sheets</text>
  </g>

  <!-- Alert arrow to Slack -->
  <path d="M290,130 C310,130 310,200 320,200" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
  <polygon points="318,196 328,200 318,204" fill="#EF4444" opacity="0.6"/>

  <!-- Slack notification -->
  <g transform="translate(330, 180)">
    <rect width="55" height="42" rx="6" fill="url(#cardGrad)" stroke="#EF4444" stroke-width="1.5"/>
    <!-- Alert bell -->
    <path d="M28,12 C28,8 22,4 18,8 C14,4 8,8 8,12 L6,22 h24 L28,12z" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1.5" transform="translate(10,2)"/>
    <text x="28" y="35" font-family="Inter, sans-serif" font-size="6" fill="#EF4444" text-anchor="middle" font-weight="600">LOW STOCK</text>
  </g>

  <!-- Reorder email arrow -->
  <path d="M245,170 C245,210 200,230 200,240" fill="none" stroke="#2563EB" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
  <polygon points="196,238 200,248 204,238" fill="#2563EB" opacity="0.6"/>

  <!-- Reorder email -->
  <g transform="translate(165, 245)">
    <rect width="70" height="35" rx="6" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="10" y="7" width="50" height="16" rx="3" fill="none" stroke="#2563EB" stroke-width="1.5"/>
    <polyline points="10,7 35,18 60,7" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
    <text x="35" y="30" font-family="Inter, sans-serif" font-size="5.5" fill="#64748B" text-anchor="middle">Reorder Email</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="20" cy="25" r="15" fill="#2563EB" opacity="0.06"/>
  <circle cx="385" cy="280" r="20" fill="#0EA5E9" opacity="0.06"/>
  <circle cx="370" cy="30" r="10" fill="#10B981" opacity="0.08"/>

  <!-- Status text -->
  <text x="200" y="292" font-family="Inter, sans-serif" font-size="10" fill="#64748B" text-anchor="middle" font-weight="500">Real-Time Inventory Sync + Low-Stock Alerts</text>
</svg>