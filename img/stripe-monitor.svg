<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="32" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#00E5FF" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/><line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Eye/monitor icon -->
  <g transform="translate(256,200)" fill="none" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-80,0 C-80,-45 -45,-80 0,-80 C45,-80 80,-45 80,0 C80,45 45,80 0,80 C-45,80 -80,45 -80,0" opacity="0.15" fill="#0EA5E9" stroke="none"/>
    <ellipse cx="0" cy="0" rx="70" ry="40"/>
    <circle cx="0" cy="0" r="18" fill="#0EA5E9"/>
    <circle cx="0" cy="0" r="6" fill="#0F172A"/>
    <!-- Signal waves -->
    <path d="M50,-30 C65,-20 65,20 50,30" opacity="0.4"/>
    <path d="M62,-40 C82,-25 82,25 62,40" opacity="0.25"/>
  </g>
  <!-- Price -->
  <text x="256" y="330" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="#0EA5E9">$99/mo</text>
  <!-- Tier name -->
  <text x="256" y="385" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="800" fill="white" letter-spacing="2">MONITOR</text>
  <!-- Brand -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="500" fill="#64748B" letter-spacing="4">STROMATION</text>
  <!-- Accent line -->
  <rect x="206" y="350" width="100" height="3" rx="1.5" fill="#0EA5E9" opacity="0.6"/>
</svg>