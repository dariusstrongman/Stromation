<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="lineChartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="pieGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="pieGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="dataFlowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="112%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="114%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLg" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <clipPath id="dashClip">
      <rect x="48" y="20" width="340" height="270" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- === DATA FLOW LINES (left side, flowing into dashboard) === -->
  <g opacity="0.4">
    <path d="M0,80 C15,80 25,75 35,68" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <path d="M0,120 C15,118 25,110 35,100" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <path d="M0,160 C15,158 25,150 35,140" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <path d="M0,200 C15,195 25,185 35,175" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <path d="M0,240 C10,235 20,220 30,210" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.3"/>
  </g>
  <!-- Animated data dots flowing in -->
  <circle r="2.5" fill="#2563EB" opacity="0.6">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M0,80 C15,80 25,75 35,68"/>
  </circle>
  <circle r="2.5" fill="#0EA5E9" opacity="0.6">
    <animateMotion dur="3s" repeatCount="indefinite" path="M0,160 C15,158 25,150 35,140"/>
  </circle>
  <circle r="2.5" fill="#10B981" opacity="0.5">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M0,240 C10,235 20,220 30,210"/>
  </circle>

  <!-- === DASHBOARD CONTAINER === -->
  <g filter="url(#shadowLg)">
    <rect x="38" y="15" width="350" height="270" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Dashboard top bar -->
    <rect x="38" y="15" width="350" height="32" rx="12" fill="url(#blueGrad)" opacity="0.95"/>
    <rect x="38" y="35" width="350" height="12" fill="url(#blueGrad)" opacity="0.95"/>
    <!-- Window dots -->
    <circle cx="56" cy="31" r="4" fill="white" opacity="0.7"/>
    <circle cx="68" cy="31" r="4" fill="white" opacity="0.5"/>
    <circle cx="80" cy="31" r="4" fill="white" opacity="0.35"/>
    <!-- Tab indicators -->
    <rect x="280" y="26" width="30" height="10" rx="5" fill="white" opacity="0.2"/>
    <rect x="315" y="26" width="30" height="10" rx="5" fill="white" opacity="0.15"/>
    <rect x="350" y="26" width="30" height="10" rx="5" fill="white" opacity="0.1"/>
  </g>

  <!-- === METRIC CARDS ROW === -->
  <!-- Card 1 -->
  <g filter="url(#shadowSm)">
    <rect x="52" y="58" width="76" height="44" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="58" y="64" width="30" height="4" rx="2" fill="#1E293B" opacity="0.12"/>
    <rect x="58" y="74" width="45" height="8" rx="2" fill="#2563EB" opacity="0.2"/>
    <!-- Mini sparkline -->
    <polyline points="58,92 63,89 68,91 73,86 78,88 83,83 88,85 93,80 98,82" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <!-- Up arrow indicator -->
    <polygon points="115,90 120,82 125,90" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Card 2 -->
  <g filter="url(#shadowSm)">
    <rect x="136" y="58" width="76" height="44" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="142" y="64" width="35" height="4" rx="2" fill="#1E293B" opacity="0.12"/>
    <rect x="142" y="74" width="40" height="8" rx="2" fill="#0EA5E9" opacity="0.2"/>
    <polyline points="142,92 148,88 154,90 160,84 166,87 172,82 178,85 184,79 190,81" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <polygon points="199,90 204,82 209,90" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Card 3 -->
  <g filter="url(#shadowSm)">
    <rect x="220" y="58" width="76" height="44" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="226" y="64" width="28" height="4" rx="2" fill="#1E293B" opacity="0.12"/>
    <rect x="226" y="74" width="50" height="8" rx="2" fill="#10B981" opacity="0.2"/>
    <polyline points="226,92 232,90 238,88 244,90 250,85 256,87 262,82 268,84 274,80" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <polygon points="283,90 288,82 293,90" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Card 4 -->
  <g filter="url(#shadowSm)">
    <rect x="304" y="58" width="72" height="44" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="310" y="64" width="32" height="4" rx="2" fill="#1E293B" opacity="0.12"/>
    <rect x="310" y="74" width="38" height="8" rx="2" fill="#2563EB" opacity="0.2"/>
    <polyline points="310,92 316,90 322,92 328,87 334,89 340,84 346,86 352,81 358,83" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
    <polygon points="363,90 366,84 369,90" fill="#10B981" opacity="0.4"/>
  </g>

  <!-- === BAR CHART PANEL === -->
  <g filter="url(#shadowSm)">
    <rect x="52" y="112" width="160" height="100" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Chart title -->
    <rect x="60" y="120" width="50" height="4" rx="2" fill="#1E293B" opacity="0.15"/>
    <!-- Y-axis lines -->
    <line x1="72" y1="136" x2="200" y2="136" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="72" y1="152" x2="200" y2="152" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="72" y1="168" x2="200" y2="168" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="72" y1="184" x2="200" y2="184" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="72" y1="200" x2="200" y2="200" stroke="#E2E8F0" stroke-width="0.8"/>
    <!-- Y-axis labels -->
    <rect x="58" y="134" width="10" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="58" y="150" width="10" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="58" y="166" width="10" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="58" y="182" width="10" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <!-- Bars -->
    <rect x="78" y="158" width="10" height="42" rx="2" fill="url(#barGrad1)" opacity="0.85"/>
    <rect x="92" y="148" width="10" height="52" rx="2" fill="url(#barGrad2)" opacity="0.7"/>
    <rect x="108" y="162" width="10" height="38" rx="2" fill="url(#barGrad1)" opacity="0.85"/>
    <rect x="122" y="142" width="10" height="58" rx="2" fill="url(#barGrad2)" opacity="0.7"/>
    <rect x="138" y="152" width="10" height="48" rx="2" fill="url(#barGrad1)" opacity="0.85"/>
    <rect x="152" y="136" width="10" height="64" rx="2" fill="url(#barGrad2)" opacity="0.7"/>
    <rect x="168" y="145" width="10" height="55" rx="2" fill="url(#barGrad1)" opacity="0.85"/>
    <rect x="182" y="138" width="10" height="62" rx="2" fill="url(#barGrad2)" opacity="0.7"/>
    <!-- X-axis -->
    <line x1="72" y1="200" x2="200" y2="200" stroke="#1E293B" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- === LINE CHART PANEL === -->
  <g filter="url(#shadowSm)">
    <rect x="220" y="112" width="156" height="100" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Chart title -->
    <rect x="228" y="120" width="60" height="4" rx="2" fill="#1E293B" opacity="0.15"/>
    <!-- Grid lines -->
    <line x1="238" y1="140" x2="364" y2="140" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="238" y1="156" x2="364" y2="156" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="238" y1="172" x2="364" y2="172" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="238" y1="188" x2="364" y2="188" stroke="#E2E8F0" stroke-width="0.8"/>
    <line x1="238" y1="200" x2="364" y2="200" stroke="#E2E8F0" stroke-width="0.8"/>
    <!-- Y labels -->
    <rect x="226" y="138" width="8" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="226" y="154" width="8" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="226" y="170" width="8" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="226" y="186" width="8" height="3" rx="1" fill="#1E293B" opacity="0.08"/>
    <!-- Area fill under line -->
    <path d="M240,185 L258,175 L276,178 L294,162 L312,168 L330,152 L348,145 L362,140 L362,200 L240,200 Z" fill="url(#areaFill)"/>
    <!-- Line 1 (primary) -->
    <polyline points="240,185 258,175 276,178 294,162 312,168 330,152 348,145 362,140" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Line 2 (secondary) -->
    <polyline points="240,192 258,188 276,190 294,180 312,183 330,172 348,168 362,158" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" stroke-dasharray="6,3"/>
    <!-- Data points on primary line -->
    <circle cx="240" cy="185" r="3" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="276" cy="178" r="3" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="312" cy="168" r="3" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="348" cy="145" r="3" fill="white" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Highlight dot -->
    <circle cx="362" cy="140" r="4" fill="#2563EB" opacity="0.3">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="362" cy="140" r="3" fill="white" stroke="#2563EB" stroke-width="2"/>
    <!-- X-axis -->
    <line x1="238" y1="200" x2="364" y2="200" stroke="#1E293B" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- === PIE CHART PANEL === -->
  <g filter="url(#shadowSm)">
    <rect x="52" y="222" width="100" height="54" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Chart title -->
    <rect x="60" y="228" width="35" height="3.5" rx="1.5" fill="#1E293B" opacity="0.15"/>
    <!-- Pie chart -->
    <g transform="translate(88, 256)">
      <!-- Pie segments -->
      <circle cx="0" cy="0" r="16" fill="none" stroke="url(#pieGrad1)" stroke-width="8" stroke-dasharray="40 60.5" stroke-dashoffset="0" opacity="0.85"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="url(#pieGrad2)" stroke-width="8" stroke-dasharray="25 75.5" stroke-dashoffset="-40" opacity="0.75"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#10B981" stroke-width="8" stroke-dasharray="18 82.5" stroke-dashoffset="-65" opacity="0.7"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#1E293B" stroke-width="8" stroke-dasharray="17 83.5" stroke-dashoffset="-83" opacity="0.15"/>
      <!-- Center hole -->
      <circle cx="0" cy="0" r="8" fill="white"/>
    </g>
    <!-- Legend -->
    <rect x="116" y="240" width="5" height="5" rx="1" fill="#2563EB" opacity="0.85"/>
    <rect x="124" y="241" width="18" height="3" rx="1" fill="#1E293B" opacity="0.1"/>
    <rect x="116" y="249" width="5" height="5" rx="1" fill="#0EA5E9" opacity="0.75"/>
    <rect x="124" y="250" width="14" height="3" rx="1" fill="#1E293B" opacity="0.1"/>
    <rect x="116" y="258" width="5" height="5" rx="1" fill="#10B981" opacity="0.7"/>
    <rect x="124" y="259" width="20" height="3" rx="1" fill="#1E293B" opacity="0.1"/>
    <rect x="116" y="267" width="5" height="5" rx="1" fill="#1E293B" opacity="0.15"/>
    <rect x="124" y="268" width="16" height="3" rx="1" fill="#1E293B" opacity="0.1"/>
  </g>

  <!-- === MINI TABLE/LIST PANEL === -->
  <g filter="url(#shadowSm)">
    <rect x="160" y="222" width="100" height="54" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Table header -->
    <rect x="160" y="222" width="100" height="14" rx="6" fill="#2563EB" opacity="0.06"/>
    <rect x="160" y="232" width="100" height="4" fill="#2563EB" opacity="0.06"/>
    <rect x="166" y="226" width="20" height="3" rx="1" fill="#1E293B" opacity="0.15"/>
    <rect x="196" y="226" width="15" height="3" rx="1" fill="#1E293B" opacity="0.12"/>
    <rect x="224" y="226" width="18" height="3" rx="1" fill="#1E293B" opacity="0.12"/>
    <!-- Table rows -->
    <rect x="166" y="240" width="24" height="2.5" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="196" y="240" width="12" height="2.5" rx="1" fill="#2563EB" opacity="0.2"/>
    <rect x="224" y="239" width="22" height="5" rx="2.5" fill="#10B981" opacity="0.2"/>
    <line x1="164" y1="247" x2="256" y2="247" stroke="#E2E8F0" stroke-width="0.5"/>

    <rect x="166" y="251" width="20" height="2.5" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="196" y="251" width="14" height="2.5" rx="1" fill="#0EA5E9" opacity="0.2"/>
    <rect x="224" y="250" width="22" height="5" rx="2.5" fill="#0EA5E9" opacity="0.2"/>
    <line x1="164" y1="258" x2="256" y2="258" stroke="#E2E8F0" stroke-width="0.5"/>

    <rect x="166" y="262" width="22" height="2.5" rx="1" fill="#1E293B" opacity="0.08"/>
    <rect x="196" y="262" width="10" height="2.5" rx="1" fill="#2563EB" opacity="0.2"/>
    <rect x="224" y="261" width="22" height="5" rx="2.5" fill="#2563EB" opacity="0.15"/>
  </g>

  <!-- === GAUGE / KPI PANEL === -->
  <g filter="url(#shadowSm)">
    <rect x="268" y="222" width="108" height="54" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Panel title -->
    <rect x="276" y="228" width="40" height="3.5" rx="1.5" fill="#1E293B" opacity="0.15"/>
    <!-- Gauge arc -->
    <g transform="translate(300, 262)">
      <path d="M-22,-2 A22,22 0 0,1 22,-2" fill="none" stroke="#E2E8F0" stroke-width="5" stroke-linecap="round"/>
      <path d="M-22,-2 A22,22 0 0,1 14,-17" fill="none" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="round"/>
      <circle cx="0" cy="-2" r="3" fill="#2563EB" opacity="0.6"/>
      <!-- Gauge needle -->
      <line x1="0" y1="-2" x2="10" y2="-16" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </g>
    <!-- Secondary metric -->
    <g transform="translate(354, 258)">
      <rect x="-18" y="-12" width="36" height="24" rx="4" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="1" stroke-opacity="0.2"/>
      <rect x="-12" y="-6" width="24" height="5" rx="2" fill="#10B981" opacity="0.25"/>
      <polygon points="-4,5 0,0 4,5" fill="#10B981" opacity="0.4"/>
    </g>
  </g>

  <!-- === DECORATIVE ACCENTS === -->
  <circle cx="25" cy="25" r="14" fill="#2563EB" opacity="0.04"/>
  <circle cx="18" cy="150" r="8" fill="#0EA5E9" opacity="0.05"/>
  <circle cx="22" cy="280" r="10" fill="#10B981" opacity="0.04"/>
</svg>