<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F1F5F9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#1E293B" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#1E293B" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="300" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Form icon (left) -->
  <g transform="translate(40, 60)">
    <rect width="80" height="100" rx="8" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="2"/>
    <rect x="12" y="15" width="56" height="8" rx="4" fill="#2563EB" opacity="0.15"/>
    <rect x="12" y="30" width="40" height="6" rx="3" fill="#2563EB" opacity="0.1"/>
    <rect x="12" y="45" width="56" height="8" rx="4" fill="#2563EB" opacity="0.15"/>
    <rect x="12" y="60" width="48" height="6" rx="3" fill="#2563EB" opacity="0.1"/>
    <rect x="20" y="76" width="40" height="14" rx="4" fill="url(#blueGrad)"/>
    <text x="40" y="87" font-family="Inter, sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="600">SUBMIT</text>
  </g>

  <!-- Arrow from form to center -->
  <path d="M130,110 C155,110 155,110 170,110" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="168,106 178,110 168,114" fill="#0EA5E9" opacity="0.7"/>

  <!-- Central automation hub -->
  <g transform="translate(180, 70)">
    <rect width="70" height="80" rx="10" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="2"/>
    <!-- Gear icon -->
    <circle cx="35" cy="30" r="12" fill="none" stroke="#2563EB" stroke-width="2.5"/>
    <circle cx="35" cy="30" r="5" fill="#2563EB" opacity="0.3"/>
    <line x1="35" y1="15" x2="35" y2="19" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="41" x2="35" y2="45" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="24" y2="30" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="46" y1="30" x2="50" y2="30" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
    <!-- n8n label -->
    <text x="35" y="62" font-family="Inter, sans-serif" font-size="9" fill="#2563EB" text-anchor="middle" font-weight="700">n8n</text>
  </g>

  <!-- Arrows from hub to outputs -->
  <path d="M258,90 C280,90 290,60 310,60" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="308,56 318,60 308,64" fill="#0EA5E9" opacity="0.7"/>

  <path d="M258,110 C280,110 290,110 310,110" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="308,106 318,110 308,114" fill="#0EA5E9" opacity="0.7"/>

  <path d="M258,130 C280,130 290,160 310,160" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="308,156 318,160 308,164" fill="#0EA5E9" opacity="0.7"/>

  <!-- Output 1: ClickUp project card -->
  <g transform="translate(320, 40)">
    <rect width="60" height="36" rx="6" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="8" y="8" width="28" height="4" rx="2" fill="#2563EB" opacity="0.3"/>
    <rect x="8" y="16" width="20" height="3" rx="1.5" fill="#1E293B" opacity="0.15"/>
    <path d="M44,22 L47,26 L53,18" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Output 2: Email -->
  <g transform="translate(320, 92)">
    <rect width="60" height="36" rx="6" fill="url(#cardGrad)" stroke="#0EA5E9" stroke-width="1.5"/>
    <rect x="10" y="8" width="40" height="22" rx="3" fill="none" stroke="#2563EB" stroke-width="1.5"/>
    <polyline points="10,8 30,22 50,8" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Output 3: Calendar -->
  <g transform="translate(320, 142)">
    <rect width="60" height="36" rx="6" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="10" y="6" width="40" height="26" rx="3" fill="none" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="10" y1="14" x2="50" y2="14" stroke="#0EA5E9" stroke-width="1.5"/>
    <rect x="16" y="18" width="6" height="5" rx="1" fill="#2563EB" opacity="0.3"/>
    <rect x="27" y="18" width="6" height="5" rx="1" fill="#10B981" opacity="0.4"/>
    <rect x="38" y="18" width="6" height="5" rx="1" fill="#2563EB" opacity="0.2"/>
  </g>

  <!-- Bottom: Google Drive folder -->
  <g transform="translate(140, 195)">
    <rect width="120" height="60" rx="8" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5"/>
    <!-- Folder icon -->
    <path d="M160,218 h30 a3,3 0 0,1 3,3 v18 a3,3 0 0,1 -3,3 h-40 a3,3 0 0,1 -3,-3 v-22 a3,3 0 0,1 3,-3 h7 l3,4 z" transform="translate(-100,-5)" fill="#2563EB" opacity="0.15" stroke="#2563EB" stroke-width="1.5"/>
    <text x="60" y="48" font-family="Inter, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Google Drive</text>
  </g>

  <!-- Arrow from hub down to Drive -->
  <path d="M215,155 C215,175 200,185 200,195" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="196,193 200,203 204,193" fill="#0EA5E9" opacity="0.7"/>

  <!-- Decorative circles -->
  <circle cx="20" cy="25" r="15" fill="#2563EB" opacity="0.06"/>
  <circle cx="385" cy="280" r="20" fill="#0EA5E9" opacity="0.06"/>
  <circle cx="370" cy="30" r="10" fill="#10B981" opacity="0.08"/>

  <!-- Status text -->
  <text x="200" y="285" font-family="Inter, sans-serif" font-size="10" fill="#64748B" text-anchor="middle" font-weight="500">Form Submit → Project + Email + Calendar + Folder</text>
</svg>